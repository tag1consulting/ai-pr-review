name: AI PR Review
description: >
  AI-powered pull request review using multiple LLM agents.
  Posts a summary comment and inline review findings on the PR.

  NOTE: This is the legacy composite action. It installs shellcheck on the
  runner but does not install semgrep, trufflehog, ruff, or golangci-lint.
  New consumers should use the container-action variant instead:
    uses: tag1consulting/ai-pr-review/container-action@main
  The container action pulls a pre-built image with all analyzer binaries
  pinned at verified versions. See container-action/action.yml.

inputs:
  # --- Provider ---
  provider:
    description: >
      LLM provider: anthropic | openai | openai-compatible | google | bedrock-proxy
    required: false
    default: 'anthropic'

  # --- Credentials ---
  api-key:
    description: >
      API key for the chosen provider.
      Maps to ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_API_KEY, or BEDROCK_API_KEY
      depending on the provider.
    required: true

  base-url:
    description: >
      Base URL for OpenAI-compatible or bedrock-proxy endpoints.
      Not needed for anthropic or google providers.
    required: false
    default: ''

  # --- Model overrides ---
  model-standard:
    description: >
      Model ID for standard agents (pr-summarizer, code-reviewer, etc.).
      Defaults to the provider's standard model.
    required: false
    default: ''

  model-premium:
    description: >
      Model ID for premium/deep-analysis agents (architecture, security).
      Only used in full review mode. Defaults to the provider's premium model.
    required: false
    default: ''

  # --- Review mode ---
  review-mode:
    description: >
      Review mode: quick (code-reviewer + conditional agents) or full (all agents including architecture,
      security, blind-hunter, edge-case-hunter, adversarial-general).
    required: false
    default: 'quick'

  review-target:
    description: >
      Review target: pr (post review on a pull request) or standalone
      (post findings as a GitHub issue without requiring a PR).
      Default: pr.
    required: false
    default: 'pr'

  max-diff-lines:
    description: >
      Maximum diff size in lines before the review is skipped to prevent runaway
      token consumption. A comment is posted on the PR explaining the skip.
    required: false
    default: '5000'

  # --- PR metadata (normally auto-detected from github context) ---
  pr-number:
    description: >
      Pull request number. Required for pr review-target; not used in standalone mode.
    required: false
    default: ''

  base-ref:
    description: Base branch name (e.g., main)
    required: true

  head-sha:
    description: Head commit SHA
    required: true

  github-token:
    description: >
      GitHub token for posting reviews and comments.
      Needs pull-requests: write permission.
    required: true

  # --- Performance ---
  parallel:
    description: >
      Run agents in parallel (tiered fan-out) to reduce wall-clock time.
      Tier 1 (pr-summarizer, code-reviewer, silent-failure-hunter) and all static
      analyzers run concurrently; Tier 2 full-mode agents (architecture, security,
      blind, edge-case, adversarial) run as a second concurrent batch after Tier 1
      completes. Set to false to revert to sequential execution if you hit provider
      rate limits.
    required: false
    default: 'true'

  # --- Output limits ---
  max-inline:
    description: >
      Maximum number of inline review comments posted per run.
      Findings beyond this limit are included in the PR summary comment body instead.
      Set to 0 to post all findings in the summary body with no inline comments.
    required: false
    default: '25'

  temperature:
    description: >
      Sampling temperature for LLM calls. Controls output randomness; lower values
      produce more deterministic responses. Must be a float in [0, 2]. The default
      (0.3) is tuned for code review. Sets AI_TEMPERATURE.
    required: false
    default: '0.3'

  max-tokens-per-agent:
    description: >
      Maximum number of output tokens each LLM agent may generate per call.
      Lower values reduce cost and latency; higher values allow more detailed output
      on large diffs. Must be a positive integer; values outside [256, 65536] are
      clamped to that range with a warning. Default changed from 32768 to 16384 in v1.3.0.
    required: false
    default: '16384'

  analyzer-concurrency:
    description: >
      Maximum number of native static-analyzer subprocesses to run simultaneously.
      Defaults to 4. Set to 1 to restore sequential behaviour (equivalent to setting
      parallel: false). Ignored when parallel: false is set (concurrency is forced to 1).
      Requires the Python engine. Sets AI_ANALYZER_CONCURRENCY.
    required: false
    default: '4'

  enable-suggestions:
    description: >
      Enable GitHub "Apply suggestion" buttons on inline review comments. When true,
      eligible LLM agents (code-reviewer, edge-case-hunter, security-reviewer,
      silent-failure-hunter, blind-hunter) are instructed to generate concrete code
      replacement suggestions that PR authors can accept with one click.
      Increases output token usage. Supported on GitHub and GitLab; ignored on Bitbucket.
    required: false
    default: 'true'

  engine:
    description: >
      Compute engine to use. 'python' (default) is the supported engine; 'bash'
      is the deprecated legacy pipeline (will be removed in a future major release).
      Context enrichment, SARIF ingestion, and the learning loop all require the
      Python engine. Sets AI_PR_REVIEW_ENGINE.
    required: false
    default: 'python'

  ignore-merge-commits:
    description: >
      When true, strip merge commits that pulled in upstream base-branch changes
      before computing the diff. Only the PR author's own commits are reviewed.
      Intra-PR merges (merging one feature branch into another) are preserved.
      Falls back to the unfiltered diff if cherry-pick conflicts occur.
    required: false
    default: 'true'

  sarif-paths:
    description: >
      Comma-separated list of SARIF 2.1.0 file paths to ingest as additional
      findings. Each path is relative to the workspace root. Requires the
      Python engine (engine: python). Findings are merged into the same
      dedup/suppress pipeline as native analyzer results.
    required: false
    default: ''

  exclude-patterns:
    description: >
      Comma-separated list of git pathspec glob patterns to exclude from the diff
      in addition to the built-in excludes (lockfiles, vendor/, node_modules/).
      Each pattern should be a glob such as "docs/*" or "*.generated.go". The
      leading ":!" pathspec prefix is added automatically. Entries are split on
      commas; surrounding whitespace is trimmed and empty entries are dropped, so
      "docs/*, *.generated.go" is treated the same as "docs/*,*.generated.go".
      Requires the Python engine. See exclude-patterns-mode to control interaction
      with the built-in defaults.
    required: false
    default: ''

  exclude-patterns-mode:
    description: >
      Controls how exclude-patterns interacts with the built-in exclude list.
      "append" (default): user patterns are added to the built-in excludes.
      "replace": only user patterns are used; the built-in lockfile/vendor excludes
      are dropped. "replace" with an empty exclude-patterns falls back to the
      built-in defaults with a warning. Invalid values are rejected with an error.
    required: false
    default: 'append'

  analyzer-diff-scope:
    description: >
      Controls how native static-analyzer findings on lines outside the PR
      diff are handled. "cap" (default) downgrades them to Low severity and
      collapses them into a folded section in the review body so they cannot
      trigger CHANGES_REQUESTED. "drop" removes them entirely. "off" passes
      them through unchanged (full-file linting behaviour). LLM-agent findings
      are not affected by this setting.
    required: false
    default: 'cap'

  context-enrichment:
    description: >
      When true, extract symbol references from the diff and look them up
      in the repo using ripgrep, then inject a <symbol-context> block into
      each agent's prompt. Requires tree-sitter-language-pack and ripgrep.
      Only available with the Python engine.
    required: false
    default: 'false'

  feedback-loop:
    description: >
      When true, load recent feedback entries from the GitBranchStore and
      inject a <repo-feedback> block into each agent's prompt. GitHub-only.
      Requires GH_TOKEN with contents:write on the feedback branch.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install shellcheck
      shell: bash
      run: |
        if ! command -v shellcheck &>/dev/null; then
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck || {
            echo "ERROR: Failed to install shellcheck" >&2
            exit 1
          }
        fi

    - name: Mask API credentials
      shell: bash
      env:
        _API_KEY: ${{ inputs.api-key }}
        _GH_TOKEN: ${{ inputs.github-token }}
      run: |
        [[ -n "$_API_KEY" ]] && echo "::add-mask::$_API_KEY"
        [[ -n "$_GH_TOKEN" ]] && echo "::add-mask::$_GH_TOKEN"

    - name: Validate provider and export API key
      shell: bash
      env:
        _PROVIDER: ${{ inputs.provider }}
        _API_KEY: ${{ inputs.api-key }}
      run: |
        # Valid provider set mirrors config.py:_PROVIDER_DEFAULTS + llm/client.py dispatch.
        # Keep in sync with: ai_pr_review/config.py (_PROVIDER_DEFAULTS keys + openai-compatible)
        #                    ai_pr_review/llm/client.py (ValueError message at line ~63)
        case "$_PROVIDER" in
          anthropic)
            echo "ANTHROPIC_API_KEY=$_API_KEY" >> "$GITHUB_ENV"
            ;;
          openai|openai-compatible)
            echo "OPENAI_API_KEY=$_API_KEY" >> "$GITHUB_ENV"
            ;;
          google)
            echo "GOOGLE_API_KEY=$_API_KEY" >> "$GITHUB_ENV"
            ;;
          bedrock-proxy)
            echo "BEDROCK_API_KEY=$_API_KEY" >> "$GITHUB_ENV"
            ;;
          *)
            echo "ERROR: Unknown provider '$_PROVIDER'. Valid values: anthropic | openai | openai-compatible | google | bedrock-proxy" >&2
            exit 1
            ;;
        esac

    - name: Run AI review
      shell: bash
      env:
        AI_PROVIDER: ${{ inputs.provider }}
        AI_REVIEW_MODE: ${{ inputs.review-mode }}
        REVIEW_TARGET: ${{ inputs.review-target }}
        MAX_DIFF_LINES: ${{ inputs.max-diff-lines }}
        AI_MODEL_STANDARD: ${{ inputs.model-standard }}
        AI_MODEL_PREMIUM: ${{ inputs.model-premium }}
        # The provider-specific API key is exported to $GITHUB_ENV in the
        # preceding "Validate provider and export API key" step, so only the
        # matching var is set in the environment by the time this step runs.
        OPENAI_BASE_URL: ${{ inputs.base-url }}
        BEDROCK_API_URL: ${{ inputs.base-url }}
        # GitHub context
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        BASE_REF: ${{ inputs.base-ref }}
        HEAD_SHA: ${{ inputs.head-sha }}
        AI_PARALLEL: ${{ inputs.parallel }}
        AI_MAX_INLINE: ${{ inputs.max-inline }}
        AI_TEMPERATURE: ${{ inputs.temperature }}
        AI_MAX_TOKENS_PER_AGENT: ${{ inputs.max-tokens-per-agent }}
        AI_ANALYZER_CONCURRENCY: ${{ inputs.analyzer-concurrency }}
        AI_ENABLE_SUGGESTIONS: ${{ inputs.enable-suggestions }}
        AI_PR_REVIEW_ENGINE: ${{ inputs.engine }}
        AI_IGNORE_MERGE_COMMITS: ${{ inputs.ignore-merge-commits }}
        AI_SARIF_PATHS: ${{ inputs.sarif-paths }}
        AI_EXCLUDE_PATTERNS: ${{ inputs.exclude-patterns }}
        AI_EXCLUDE_PATTERNS_MODE: ${{ inputs.exclude-patterns-mode }}
        AI_ANALYZER_DIFF_SCOPE: ${{ inputs.analyzer-diff-scope }}
        AI_CONTEXT_ENRICHMENT: ${{ inputs.context-enrichment }}
        AI_FEEDBACK_LOOP: ${{ inputs.feedback-loop }}
      run: bash "${{ github.action_path }}/review.sh"
