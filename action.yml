name: AI PR Review
description: >
  AI-powered pull request review using multiple LLM agents.
  Posts a summary comment and inline review findings on the PR.

inputs:
  # --- Provider ---
  provider:
    description: >
      LLM provider: anthropic | openai | openai-compatible | google | bedrock-proxy
    required: false
    default: 'anthropic'

  # --- Credentials ---
  api-key:
    description: >
      API key for the chosen provider.
      Maps to ANTHROPIC_API_KEY, OPENAI_API_KEY, GOOGLE_API_KEY, or BEDROCK_API_KEY
      depending on the provider.
    required: true

  base-url:
    description: >
      Base URL for OpenAI-compatible or bedrock-proxy endpoints.
      Not needed for anthropic or google providers.
    required: false
    default: ''

  # --- Model overrides ---
  model-standard:
    description: >
      Model ID for standard agents (pr-summarizer, code-reviewer, etc.).
      Defaults to the provider's standard model.
    required: false
    default: ''

  model-premium:
    description: >
      Model ID for premium/deep-analysis agents (architecture, security).
      Only used in full review mode. Defaults to the provider's premium model.
    required: false
    default: ''

  # --- Review mode ---
  review-mode:
    description: >
      Review mode: quick (code-reviewer + conditional agents) or full (all agents including architecture,
      security, blind-hunter, edge-case-hunter, adversarial-general).
    required: false
    default: 'quick'

  force-full-diff:
    description: >-
      Force a full-PR diff, bypassing the SHA watermark that normally enables
      incremental reviews. Set to 'true' to re-review the full diff
      (origin/BASE_REF...HEAD_SHA). The watermark advances normally after the
      run (one-shot per invocation). Typically set via the ai-review-rescan PR
      label in the workflow.
    required: false
    default: 'false'

  review-target:
    description: >
      Review target: pr (post review on a pull request) or standalone
      (post findings as a GitHub issue without requiring a PR).
      Default: pr.
    required: false
    default: 'pr'

  standalone-depth:
    description: >
      In standalone mode, when base-ref resolves to the same commit as head-sha
      (e.g. reviewing the tip of main against itself), diff the last N commits
      instead. If not set, diffs the entire tree against the empty tree
      (reviews all file content).
    required: false
    default: ''

  max-diff-lines:
    description: >
      Maximum diff size in lines before the review is skipped to prevent runaway
      token consumption. A comment is posted on the PR explaining the skip.
    required: false
    default: '5000'

  # --- PR metadata (normally auto-detected from github context) ---
  pr-number:
    description: >
      Pull request number. Required for pr review-target; not used in standalone mode.
    required: false
    default: ''

  base-ref:
    description: Base branch name (e.g., main)
    required: true

  head-sha:
    description: Head commit SHA
    required: true

  github-token:
    description: >
      GitHub token for posting reviews and comments.
      Needs pull-requests: write permission.
    required: true

  # --- Resilience ---
  retry-count:
    description: >
      Number of retry attempts for transient LLM API failures (429, 5xx, timeouts).
      Set to 0 to disable retries. Uses exponential backoff with jitter.
    required: false
    default: '3'

  # --- Performance ---
  parallel:
    description: >
      Run agents in parallel (tiered fan-out) to reduce wall-clock time.
      Tier 1 (pr-summarizer, code-reviewer, silent-failure-hunter) and the static
      analyzers (shellcheck, CVE check) run concurrently; Tier 2 full-mode agents
      (architecture, security, blind, edge-case, adversarial) run as a second
      concurrent batch after Tier 1 completes.
      Defaults to false for conservative rollout. Enable after verifying your LLM
      provider's rate limits can sustain 3–5 concurrent requests.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install shellcheck
      shell: bash
      run: |
        if ! command -v shellcheck &>/dev/null; then
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck || {
            echo "ERROR: Failed to install shellcheck" >&2
            exit 1
          }
        fi

    - name: Mask API credentials
      shell: bash
      env:
        _API_KEY: ${{ inputs.api-key }}
        _GH_TOKEN: ${{ inputs.github-token }}
      run: |
        [[ -n "$_API_KEY" ]] && echo "::add-mask::$_API_KEY"
        [[ -n "$_GH_TOKEN" ]] && echo "::add-mask::$_GH_TOKEN"

    - name: Run AI review
      shell: bash
      env:
        AI_PROVIDER: ${{ inputs.provider }}
        AI_REVIEW_MODE: ${{ inputs.review-mode }}
        FORCE_FULL_DIFF: ${{ inputs.force-full-diff }}
        REVIEW_TARGET: ${{ inputs.review-target }}
        STANDALONE_DEPTH: ${{ inputs.standalone-depth }}
        MAX_DIFF_LINES: ${{ inputs.max-diff-lines }}
        AI_MODEL_STANDARD: ${{ inputs.model-standard }}
        AI_MODEL_PREMIUM: ${{ inputs.model-premium }}
        # Map the single api-key input to all provider-specific env vars.
        # Only the one matching AI_PROVIDER will actually be read.
        ANTHROPIC_API_KEY: ${{ inputs.api-key }}
        OPENAI_API_KEY: ${{ inputs.api-key }}
        GOOGLE_API_KEY: ${{ inputs.api-key }}
        BEDROCK_API_KEY: ${{ inputs.api-key }}
        OPENAI_BASE_URL: ${{ inputs.base-url }}
        BEDROCK_API_URL: ${{ inputs.base-url }}
        # GitHub context
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        BASE_REF: ${{ inputs.base-ref }}
        HEAD_SHA: ${{ inputs.head-sha }}
        LLM_RETRY_COUNT: ${{ inputs.retry-count }}
        AI_PARALLEL: ${{ inputs.parallel }}
      run: bash "${{ github.action_path }}/review.sh"
