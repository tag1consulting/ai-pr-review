name: AI PR Review (container)
description: >
  AI-powered pull request review using a pinned container image.
  Pulls the public image from GHCR and runs the review inside Docker.
  Use this variant instead of the root action.yml when you want version-pinned
  analyzer binaries (shellcheck, semgrep, trufflehog, ruff, golangci-lint).

inputs:
  image-tag:
    description: >
      Image tag to pull from ghcr.io/tag1consulting/ai-pr-review.
      Defaults to 'latest'. Pin to a specific version (e.g. '0.1.0') for
      reproducible builds.
    required: false
    default: 'latest'

  registry-token:
    description: >
      GitHub PAT with read:packages scope. No longer required — the image is
      public. Kept for backward compatibility; ignored when empty.
    required: false
    default: ''

  # --- All inputs below mirror root action.yml exactly ---

  provider:
    description: 'LLM provider: anthropic | openai | openai-compatible | google | bedrock-proxy'
    required: false
    default: 'anthropic'

  api-key:
    description: 'API key for the chosen LLM provider'
    required: true

  base-url:
    description: 'Base URL for openai-compatible or bedrock-proxy endpoints'
    required: false
    default: ''

  model-standard:
    description: 'Model ID for standard agents. Defaults to provider default.'
    required: false
    default: ''

  model-premium:
    description: 'Model ID for premium agents (full mode only). Defaults to provider default.'
    required: false
    default: ''

  github-token:
    description: 'GitHub token for posting reviews. Defaults to GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

  review-mode:
    description: 'quick (default) or full'
    required: false
    default: 'quick'

  review-target:
    description: 'pr (default) or standalone'
    required: false
    default: 'pr'

  pr-number:
    description: 'Pull request number'
    required: false
    default: ''

  base-ref:
    description: 'Base branch name (e.g. main)'
    required: false
    default: ''

  head-sha:
    description: 'Head commit SHA'
    required: false
    default: ''

  max-diff-lines:
    description: 'Skip review if diff exceeds this many lines'
    required: false
    default: '5000'

  parallel:
    description: 'true to run agents in parallel (default), false to run sequentially'
    required: false
    default: 'true'

  max-inline:
    description: 'Maximum inline review comments per run'
    required: false
    default: '25'

  max-tokens-per-agent:
    description: 'Max output tokens per LLM agent call'
    required: false
    default: '8192'

  enable-suggestions:
    description: 'Enable "Apply suggestion" buttons on inline review comments (GitHub and GitLab; ignored on Bitbucket; increases token usage)'
    required: false
    default: 'true'

  engine:
    description: "Compute engine: 'bash' (default) or 'python'. Required for Epic 3 capabilities (context enrichment, SARIF ingestion, learning loop)."
    required: false
    default: 'bash'

  ignore-merge-commits:
    description: >
      When true, strip merge commits that pulled in upstream base-branch changes
      before computing the diff. Only the PR author's own commits are reviewed.
      Intra-PR merges (merging one feature branch into another) are preserved.
      Falls back to the unfiltered diff if cherry-pick conflicts occur.
    required: false
    default: 'false'

  sarif-paths:
    description: >
      Comma-separated list of SARIF 2.1.0 file paths to ingest as additional
      findings. Each path is relative to the workspace root. Requires the
      Python engine (engine: python).
    required: false
    default: ''

  context-enrichment:
    description: >
      When true, extract symbol references from the diff and look them up
      in the repo using ripgrep, then inject a <symbol-context> block into
      each agent's prompt. Requires tree-sitter-language-pack and ripgrep.
      Only available with the Python engine.
    required: false
    default: 'false'

  feedback-loop:
    description: >
      When true, load recent feedback entries from the GitBranchStore and
      inject a <repo-feedback> block into each agent's prompt. GitHub-only.
      Requires GH_TOKEN with contents:write on the feedback branch.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Mask credentials
      shell: bash
      env:
        _API_KEY: ${{ inputs.api-key }}
        _GH_TOKEN: ${{ inputs.github-token }}
        _REGISTRY_TOKEN: ${{ inputs.registry-token }}
      run: |
        [[ -n "$_API_KEY" ]]       && echo "::add-mask::$_API_KEY" || true
        [[ -n "$_GH_TOKEN" ]]      && echo "::add-mask::$_GH_TOKEN" || true
        [[ -n "$_REGISTRY_TOKEN" ]] && echo "::add-mask::$_REGISTRY_TOKEN" || true

    - name: Log in to GHCR
      if: inputs.registry-token != ''
      shell: bash
      env:
        REGISTRY_TOKEN: ${{ inputs.registry-token }}
      run: |
        echo "$REGISTRY_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Run AI review in container
      shell: bash
      env:
        IMAGE: ghcr.io/tag1consulting/ai-pr-review:${{ inputs.image-tag }}
        AI_PROVIDER: ${{ inputs.provider }}
        AI_REVIEW_MODE: ${{ inputs.review-mode }}
        REVIEW_TARGET: ${{ inputs.review-target }}
        MAX_DIFF_LINES: ${{ inputs.max-diff-lines }}
        AI_MODEL_STANDARD: ${{ inputs.model-standard }}
        AI_MODEL_PREMIUM: ${{ inputs.model-premium }}
        ANTHROPIC_API_KEY: ${{ inputs.api-key }}
        OPENAI_API_KEY: ${{ inputs.api-key }}
        GOOGLE_API_KEY: ${{ inputs.api-key }}
        BEDROCK_API_KEY: ${{ inputs.api-key }}
        OPENAI_BASE_URL: ${{ inputs.base-url }}
        BEDROCK_API_URL: ${{ inputs.base-url }}
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        BASE_REF: ${{ inputs.base-ref }}
        HEAD_SHA: ${{ inputs.head-sha }}
        AI_PARALLEL: ${{ inputs.parallel }}
        AI_MAX_INLINE: ${{ inputs.max-inline }}
        AI_MAX_TOKENS_PER_AGENT: ${{ inputs.max-tokens-per-agent }}
        AI_ENABLE_SUGGESTIONS: ${{ inputs.enable-suggestions }}
        AI_PR_REVIEW_ENGINE: ${{ inputs.engine }}
        AI_IGNORE_MERGE_COMMITS: ${{ inputs.ignore-merge-commits }}
        AI_SARIF_PATHS: ${{ inputs.sarif-paths }}
        AI_CONTEXT_ENRICHMENT: ${{ inputs.context-enrichment }}
        AI_FEEDBACK_LOOP: ${{ inputs.feedback-loop }}
      run: |
        docker pull "$IMAGE"
        # Build optional GITHUB_STEP_SUMMARY volume mount into an array to avoid
        # word-splitting if the path contains spaces.
        SUMMARY_MOUNT=()
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          SUMMARY_MOUNT=(-e GITHUB_STEP_SUMMARY -v "$GITHUB_STEP_SUMMARY:$GITHUB_STEP_SUMMARY")
        fi
        docker run --rm \
          -e AI_PROVIDER \
          -e AI_REVIEW_MODE \
          -e REVIEW_TARGET \
          -e MAX_DIFF_LINES \
          -e AI_MODEL_STANDARD \
          -e AI_MODEL_PREMIUM \
          -e ANTHROPIC_API_KEY \
          -e OPENAI_API_KEY \
          -e GOOGLE_API_KEY \
          -e BEDROCK_API_KEY \
          -e OPENAI_BASE_URL \
          -e BEDROCK_API_URL \
          -e GH_TOKEN \
          -e GITHUB_REPOSITORY \
          -e PR_NUMBER \
          -e BASE_REF \
          -e HEAD_SHA \
          -e AI_PARALLEL \
          -e AI_MAX_INLINE \
          -e AI_MAX_TOKENS_PER_AGENT \
          -e AI_ENABLE_SUGGESTIONS \
          -e AI_PR_REVIEW_ENGINE \
          -e AI_IGNORE_MERGE_COMMITS \
          -e AI_SARIF_PATHS \
          -e AI_CONTEXT_ENRICHMENT \
          -e AI_FEEDBACK_LOOP \
          ${FORCE_FULL_DIFF:+-e FORCE_FULL_DIFF} \
          ${STANDALONE_DEPTH:+-e STANDALONE_DEPTH} \
          ${LLM_RETRY_COUNT:+-e LLM_RETRY_COUNT} \
          ${AI_CONFIDENCE_THRESHOLD:+-e AI_CONFIDENCE_THRESHOLD} \
          -e GITHUB_WORKSPACE=/workspace \
          -v "$GITHUB_WORKSPACE:/workspace" \
          "${SUMMARY_MOUNT[@]}" \
          "$IMAGE"
