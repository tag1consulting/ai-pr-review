name: Live Model Canary

# Scheduled, not per-PR-blocking: this makes real, billed API calls per
# model/agent combination, so it runs on a schedule rather than gating every
# PR. See tests/canary/live_model_canary.py and the #592 test plan (Tier 2)
# for background: unit tests can't catch a model-behavior surprise (they
# never call the real API), and a live e2e run against a small diff (as
# happened when Sonnet 5 became the default in #583) can miss a failure mode
# that only manifests on a genuinely demanding diff.
on:
  schedule:
    # Weekly, Monday 09:00 UTC. Not nightly: this is a slow-drift detector
    # (new model behavior), not a fast-moving signal, and API cost scales
    # with frequency.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: model-canary
  cancel-in-progress: false

jobs:
  canary:
    name: Live model canary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev dependencies
        run: pip install --quiet ".[dev]" || pip install --quiet -e . httpx anyio

      - name: Run live model canary
        id: canary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
        run: python tests/canary/live_model_canary.py

      - name: File an issue on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Live model canary failed on $(date -u +%Y-%m-%d)" \
            --label bug \
            --body "The scheduled live-model canary (\`tests/canary/live_model_canary.py\`) failed. See the [failed run]($RUN_URL) for details on which model/agent combination hit a non-end_turn stop_reason or a crash. This is the same class of failure as #592 (Sonnet 5 adaptive thinking exhausting max_tokens before any text was produced) -- check whether a model default changed recently, or whether an existing model's behavior has drifted."
