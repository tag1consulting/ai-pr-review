# AI PR Review — slash commands (this repo's own instance)
#
# Thin wrapper that delegates to the reusable slash-commands workflow.
# This repo eats its own dog food — the same pattern downstream consumers use.

name: AI PR Review — slash commands

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  slash-commands:
    if: >-
      startsWith(github.event.comment.body, '/ai-pr-review') &&
      contains(
        fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
        github.event.comment.author_association
      ) &&
      (github.event_name == 'pull_request_review_comment' ||
       (github.event_name == 'issue_comment' && github.event.issue.pull_request))
    uses: ./.github/workflows/slash-commands.yml
    with:
      event-name: ${{ github.event_name }}
      comment-body: ${{ github.event.comment.body }}
      comment-id: ${{ github.event.comment.id }}
      comment-author-association: ${{ github.event.comment.author_association }}
      issue-number: ${{ github.event.issue.number || '' }}
      pr-number: ${{ github.event.pull_request.number || '' }}
      in-reply-to-id: ${{ github.event.comment.in_reply_to_id || '' }}
      is-pull-request: ${{ github.event.issue.pull_request && 'true' || 'false' }}
      repository: ${{ github.repository }}
      repository-owner: ${{ github.repository_owner }}
      repository-name: ${{ github.event.repository.name }}
      actor-login: ${{ github.event.comment.user.login }}
      provider: ${{ vars.AI_REVIEW_PROVIDER || 'anthropic' }}
      base-url: ${{ vars.AI_REVIEW_BASE_URL || '' }}
      # vars.AI_REVIEW_IMAGE_TAG pins the container image used by feedback-command
      # (default 'latest'). Override for testing pre-release images.
      image-tag: ${{ vars.AI_REVIEW_IMAGE_TAG || 'latest' }}
      # --- Epic 3: Capability C — learning loop ---
      # vars.AI_REVIEW_FEEDBACK_LOOP enables /ai-pr-review false-positive | wont-fix
      # | feedback | explain | revise commands. Disabled by default; the
      # feedback-command job is skipped entirely until this is 'true'.
      enable-feedback-loop: ${{ vars.AI_REVIEW_FEEDBACK_LOOP || 'false' }}
      # --- Analyzer / agent filtering (Python engine) ---
      # Forwarded to rescan and review-full to keep them in sync with the main review.
      analyzers: ${{ vars.AI_REVIEW_ANALYZERS || '' }}
      exclude-analyzers: ${{ vars.AI_REVIEW_EXCLUDE_ANALYZERS || '' }}
      agents: ${{ vars.AI_REVIEW_AGENTS || '' }}
      exclude-agents: ${{ vars.AI_REVIEW_EXCLUDE_AGENTS || '' }}
    secrets:
      api-key: ${{ secrets.AI_REVIEW_API_KEY }}
      # Must be a PAT (repo scope) or GitHub App token — not GITHUB_TOKEN.
      # GITHUB_TOKEN from pull_request_review_comment events cannot call the
      # resolveReviewThread GraphQL mutation used by /ai-pr-review dismiss.
      github-token: ${{ secrets.GH_TOKEN }}
      # Built-in GITHUB_TOKEN: used for all plain comment posts, reactions,
      # reads, and label changes so those operations post as github-actions[bot].
      actions-token: ${{ secrets.GITHUB_TOKEN }}
