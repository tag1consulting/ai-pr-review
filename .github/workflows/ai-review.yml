name: AI PR Review

on:
  # pull_request_target runs the workflow from the BASE branch, not the fork.
  # This gives fork PRs access to secrets (API keys) while keeping the workflow
  # and container-action code trusted — forks cannot modify either.
  pull_request_target:
    types: [opened, synchronize, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty for standalone branch review)"
        required: false
        default: ''
      branch:
        description: "Branch to review in standalone mode (ignored if pr_number is set; defaults to default branch)"
        required: false
        default: ''
      review_mode:
        description: Review mode
        required: false
        default: full
        type: choice
        options: [quick, full]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    concurrency:
      group: ai-review-${{ github.event.pull_request.number || inputs.pr_number || inputs.branch || 'standalone' }}
      cancel-in-progress: true
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.draft == false &&
       !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') &&
       (github.event.action != 'labeled' ||
        github.event.label.name == 'ai-review-full' ||
        github.event.label.name == 'ai-review-rescan'))
    runs-on: ubuntu-latest
    steps:
      # Check out the PR head commit for diff content, but with persist-credentials
      # disabled so the fork cannot abuse the GITHUB_TOKEN.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch || github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      # Restore trusted container-action from the base branch so a fork PR
      # cannot substitute a malicious action.yml.
      - name: Restore trusted container-action
        if: github.event_name == 'pull_request_target'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git checkout "$BASE_SHA" -- container-action/

      # For workflow_dispatch (PR mode): look up base ref and head SHA from the given PR number.
      - name: Resolve PR refs
        id: resolve-pr
        if: github.event_name == 'workflow_dispatch' && inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ inputs.pr_number }}
        run: |
          base_ref=$(gh pr view "$PR_NUM" --json baseRefName --jq '.baseRefName')
          head_sha=$(gh pr view "$PR_NUM" --json headRefOid --jq '.headRefOid')
          echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"

      # For workflow_dispatch (standalone mode): resolve HEAD SHA; always diff against default branch.
      - name: Resolve standalone refs
        id: resolve-standalone
        if: github.event_name == 'workflow_dispatch' && inputs.pr_number == ''
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          head_sha=$(git rev-parse HEAD)
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${DEFAULT_BRANCH}" >> "$GITHUB_OUTPUT"

      - uses: ./container-action
        env:
          FORCE_FULL_DIFF: ${{ contains(github.event.pull_request.labels.*.name, 'ai-review-rescan') }}
        with:
          # vars.AI_REVIEW_IMAGE_TAG controls the container tag for both
          # this auto-review workflow and the slash-commands wrapper, so the
          # two flows stay in lockstep when we cut a release.  Default 'dev'
          # so this repo keeps dogfooding the latest build.
          image-tag: ${{ vars.AI_REVIEW_IMAGE_TAG || 'dev' }}
          provider: ${{ vars.AI_REVIEW_PROVIDER || 'anthropic' }}
          api-key: ${{ secrets.AI_REVIEW_API_KEY }}
          base-url: ${{ vars.AI_REVIEW_BASE_URL || '' }}
          # vars.AI_REVIEW_MODEL_STANDARD / AI_REVIEW_MODEL_PREMIUM override the
          # provider defaults. Leave unset to use provider defaults.
          model-standard: ${{ vars.AI_REVIEW_MODEL_STANDARD || '' }}
          model-premium: ${{ vars.AI_REVIEW_MODEL_PREMIUM || '' }}
          review-mode: >-
            ${{
              inputs.review_mode ||
              (contains(github.event.pull_request.labels.*.name, 'ai-review-full') && 'full') ||
              (startsWith(github.event.pull_request.head.ref, 'release/') && 'full') ||
              'quick'
            }}
          review-target: ${{ (github.event_name == 'workflow_dispatch' && inputs.pr_number == '') && 'standalone' || 'pr' }}
          pr-number: ${{ inputs.pr_number || github.event.pull_request.number || '' }}
          base-ref: ${{ steps.resolve-standalone.outputs.base_ref || steps.resolve-pr.outputs.base_ref || github.event.pull_request.base.ref || github.event.repository.default_branch }}
          head-sha: ${{ steps.resolve-standalone.outputs.head_sha || steps.resolve-pr.outputs.head_sha || github.event.pull_request.head.sha || github.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # vars.AI_REVIEW_PARALLEL disables tiered parallel fan-out (default true).
          # Set to 'false' if you hit provider rate limits.
          parallel: ${{ vars.AI_REVIEW_PARALLEL || 'true' }}
          engine: ${{ vars.AI_PR_REVIEW_ENGINE || 'bash' }}
          # vars.AI_REVIEW_MAX_DIFF_LINES is a trusted repo variable (not user
          # input from a PR), so it's safe to interpolate directly into the
          # composite-action input. Default 5000 matches review.sh.
          max-diff-lines: ${{ vars.AI_REVIEW_MAX_DIFF_LINES || '5000' }}
          # vars.AI_REVIEW_MAX_INLINE caps inline comments per run (default 25).
          max-inline: ${{ vars.AI_REVIEW_MAX_INLINE || '25' }}
          # vars.AI_REVIEW_MAX_TOKENS_PER_AGENT caps output tokens per agent (default 8192).
          max-tokens-per-agent: ${{ vars.AI_REVIEW_MAX_TOKENS_PER_AGENT || '8192' }}
          # vars.AI_REVIEW_ENABLE_SUGGESTIONS enables "Apply suggestion" buttons (default true).
          enable-suggestions: ${{ vars.AI_REVIEW_ENABLE_SUGGESTIONS || 'true' }}
          # vars.AI_REVIEW_IGNORE_MERGE_COMMITS strips upstream base-branch
          # merge commits before diffing. Trusted repo variable; default false.
          ignore-merge-commits: ${{ vars.AI_REVIEW_IGNORE_MERGE_COMMITS || 'false' }}
          # --- Epic 3: opt-in capabilities (Python engine only) ---
          # vars.AI_REVIEW_CONTEXT_ENRICHMENT enables tree-sitter symbol-context
          # injection into agent prompts (Capability A). Requires engine=python.
          context-enrichment: ${{ vars.AI_REVIEW_CONTEXT_ENRICHMENT || 'false' }}
          # vars.AI_REVIEW_SARIF_PATHS — comma-separated SARIF 2.1.0 file paths
          # to ingest as additional findings (Capability B). Empty disables.
          sarif-paths: ${{ vars.AI_REVIEW_SARIF_PATHS || '' }}
          # vars.AI_REVIEW_FEEDBACK_LOOP enables the learning loop (Capability C):
          # loads recent <repo-feedback> entries from the ai-pr-review-bot branch
          # and injects them into agent prompts. GitHub-only.
          feedback-loop: ${{ vars.AI_REVIEW_FEEDBACK_LOOP || 'false' }}
