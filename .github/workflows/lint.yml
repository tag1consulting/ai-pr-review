name: Lint & Test

on:
  push:
    branches: [main]
    paths: ['**.sh', 'tests/**']
  pull_request:
    paths: ['**.sh', 'tests/**']

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        run: |
          shellcheck -S warning \
            review.sh \
            llm-call.sh \
            post-review.sh \
            analyzers/run-shellcheck.sh \
            analyzers/run-cve-check.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats jq

      - name: Run tests
        run: bats tests/*.bats
