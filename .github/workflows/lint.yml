name: Lint & Test

on:
  push:
    branches: [main]
    paths: ['**.py', 'tests/**', 'pyproject.toml', 'ai_pr_review/**']
  pull_request:
    paths: ['**.py', 'tests/**', 'pyproject.toml', 'ai_pr_review/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev dependencies
        run: |
          pip install --quiet ".[dev]" || pip install --quiet -e . pytest ruff mypy pydantic httpx click

      - name: ruff check
        if: matrix.python-version == '3.12'
        run: ruff check ai_pr_review/

      - name: mypy
        if: matrix.python-version == '3.12'
        run: mypy --strict ai_pr_review/

      - name: pytest
        run: python -m pytest tests/python/ -v --tb=short
