# Reusable workflow: AI PR Review slash commands
#
# Call this from a thin consumer workflow instead of copying 450+ lines
# of command-handling YAML. See examples/workflows/comment-triggers.yml
# for a ready-to-use consumer template.
#
# Supported commands (post as a PR comment):
#   /ai-pr-review rescan                      — force full diff, re-run review
#   /ai-pr-review review-full                 — run in full mode (all agents)
#   /ai-pr-review skip                        — add skip-ai-review label
#   /ai-pr-review dismiss                     — reply to a finding to mark it as false positive
#   /ai-pr-review false-positive [reason]     — record finding as false positive (learning loop)
#   /ai-pr-review wont-fix [reason]           — record finding as intentional (learning loop)
#   /ai-pr-review feedback <text>             — store free-form feedback (learning loop)
#   /ai-pr-review explain                     — request explanation from the originating agent
#   /ai-pr-review revise <hint>               — request agent revision with a hint
#   /ai-pr-review help                        — post the command list
#
# IMPORTANT: issue_comment and pull_request_review_comment workflows run
# from the default branch only. The consumer workflow that calls this must
# be merged to the default branch before commands will work.

name: AI PR Review — slash commands (reusable)

on:
  workflow_call:
    inputs:
      provider:
        description: 'LLM provider: anthropic | openai | openai-compatible | google | bedrock-proxy'
        type: string
        required: false
        default: 'anthropic'
      base-url:
        description: 'Base URL for openai-compatible or bedrock-proxy endpoints'
        type: string
        required: false
        default: ''
      image-tag:
        description: 'Container image tag (e.g. latest, 0.7.0)'
        type: string
        required: false
        default: 'latest'
      review-mode-default:
        description: 'Default review mode for rescan command (quick or full)'
        type: string
        required: false
        default: 'quick'
      analyzers:
        description: >
          Allowlist of static analyzer names to run (comma-separated). When set, only the
          listed analyzers run and exclude-analyzers is ignored. Empty (default): all
          eligible analyzers run. Valid names: shellcheck, trufflehog, semgrep, ruff,
          golangci-lint, hadolint, checkov, phpcs, phpstan, eslint, kube-linter, tflint,
          cve-check. Python engine only.
        type: string
        required: false
        default: ''
      exclude-analyzers:
        description: >
          Denylist of static analyzer names to skip (comma-separated). Ignored when
          analyzers (allowlist) is set. Empty (default): all eligible analyzers run. Valid
          names: shellcheck, trufflehog, semgrep, ruff, golangci-lint, hadolint, checkov,
          phpcs, phpstan, eslint, kube-linter, tflint, cve-check. Python engine only.
        type: string
        required: false
        default: ''
      agents:
        description: >
          Allowlist of review agent names to run (comma-separated). When set, only the
          listed agents run and exclude-agents is ignored. Gates (full_mode_only,
          conditional triggers) still apply on top. Empty (default): all eligible agents
          run. Valid names: pr-summarizer, code-reviewer, silent-failure-hunter,
          architecture-reviewer, security-reviewer, blind-hunter, edge-case-hunter,
          adversarial-general, issue-linker. Python engine only.
        type: string
        required: false
        default: ''
      exclude-agents:
        description: >
          Denylist of review agent names to skip (comma-separated). Ignored when agents
          (allowlist) is set. Excluding pr-summarizer suppresses the PR summary comment
          entirely. Empty (default): all eligible agents run. Valid names: pr-summarizer,
          code-reviewer, silent-failure-hunter, architecture-reviewer, security-reviewer,
          blind-hunter, edge-case-hunter, adversarial-general, issue-linker. Python engine
          only.
        type: string
        required: false
        default: ''
      # GitHub context — the caller must forward these from the event payload.
      # workflow_call does not propagate github.event to the callee.
      event-name:
        description: 'github.event_name from the caller'
        type: string
        required: true
      comment-body:
        description: 'The comment body text'
        type: string
        required: true
      comment-id:
        description: 'The comment database ID'
        type: string
        required: true
      comment-author-association:
        description: 'author_association of the commenter'
        type: string
        required: true
      issue-number:
        description: 'PR/issue number (from issue_comment events)'
        type: string
        required: false
        default: ''
      pr-number:
        description: 'PR number (from pull_request_review_comment events)'
        type: string
        required: false
        default: ''
      in-reply-to-id:
        description: 'Parent comment ID for dismiss (pull_request_review_comment only)'
        type: string
        required: false
        default: ''
      is-pull-request:
        description: 'Whether the issue_comment is on a PR (true/false)'
        type: string
        required: false
        default: 'false'
      repository:
        description: 'owner/repo string'
        type: string
        required: true
      repository-owner:
        description: 'Repository owner'
        type: string
        required: true
      repository-name:
        description: 'Repository name (without owner)'
        type: string
        required: true
      actor-login:
        description: 'Login of the user who posted the command'
        type: string
        required: false
        default: ''
      enable-feedback-loop:
        description: >
          Set to 'true' to enable Capability C learning-loop commands
          (false-positive, wont-fix, feedback, explain, revise). When false
          (default), the feedback-command job is skipped entirely.
        type: string
        required: false
        default: 'false'
      finding-source:
        description: 'Source tag of the finding being acted on (e.g. code-reviewer, sarif:bandit). Used by feedback-loop commands.'
        type: string
        required: false
        default: ''
      finding-file:
        description: 'File path the finding was on. Used by feedback-loop commands.'
        type: string
        required: false
        default: ''
      finding-rule-id:
        description: 'Rule ID of the finding (e.g. SARIF ruleId). Used by feedback-loop commands.'
        type: string
        required: false
        default: ''
    secrets:

      api-key:
        description: 'API key for the LLM provider'
        required: true
      github-token:
        description: >
          PAT (classic: repo scope, or fine-grained: pull_requests:write) or GitHub App
          token. Required ONLY for the dismiss command's resolveReviewThread GraphQL
          mutation and review-dismissal REST calls — plain GITHUB_TOKEN cannot call those
          on pull_request_review_comment events. All other replies and reactions use
          actions-token. See docs/slash-commands.md for setup instructions.
        required: true
      actions-token:
        description: >
          Built-in GITHUB_TOKEN (pass secrets.GITHUB_TOKEN / github.token from your
          caller). Used for all plain comment posting, reactions, reads, label changes,
          and checkout so those operations post as github-actions[bot]. Optional: falls
          back to this workflow's own github.token when the caller omits it, so a stale
          consumer missing this secret degrades gracefully instead of failing at
          run-graph setup (see #571). Passing it explicitly is still recommended so
          comments post as github-actions[bot] rather than under the caller's own
          workflow identity.
        required: false

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  handle-command:
    if: |
      inputs.event-name == 'issue_comment' &&
      inputs.is-pull-request == 'true' &&
      startsWith(inputs.comment-body, '/ai-pr-review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), inputs.comment-author-association)
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.cmd.outputs.command }}
      finding_id: ${{ steps.cmd.outputs.finding_id }}
    steps:
      - name: Parse command
        id: cmd
        env:
          COMMENT: ${{ inputs.comment-body }}
        run: |
          command=$(echo "$COMMENT" | head -1 | tr -d '\r' | awk '{print $2}')
          case "$command" in
            rescan|review-full|skip|help)
              echo "command=$command" >> "$GITHUB_OUTPUT"
              echo "valid=true"       >> "$GITHUB_OUTPUT"
              ;;
            dismiss|false-positive|wont-fix|explain|revise)
              # These commands accept an optional F<n> body-finding ID from a
              # top-level PR comment. Handled by dismiss-body-finding job.
              echo "command=$command" >> "$GITHUB_OUTPUT"
              echo "valid=true"       >> "$GITHUB_OUTPUT"
              # Extract optional finding ID (e.g. "F3" or "f3") from second token.
              # Validate strictly: must be F followed by 1-6 digits only (caps at F999999).
              second_token=$(echo "$COMMENT" | head -1 | tr -d '\r' | awk '{print $3}')
              if echo "$second_token" | grep -qiE '^F[0-9]{1,6}$'; then
                finding_num=$(echo "$second_token" | grep -oE '[0-9]{1,6}')
                echo "finding_id=${finding_num}" >> "$GITHUB_OUTPUT"
              else
                echo "finding_id=" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: React — seen
        if: steps.cmd.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=eyes

      - name: Reply with help text
        if: steps.cmd.outputs.command == 'help'
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          gh pr comment "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --body "$(cat <<'HELP'
          **AI PR Review commands:**
          - `/ai-pr-review rescan` — force full diff re-review
          - `/ai-pr-review review-full` — run all agents (full mode)
          - `/ai-pr-review skip` — suppress the next automated review
          - `/ai-pr-review dismiss` — reply to an **inline** finding to mark it as a false positive (resolves that thread; dismisses the review when all threads are resolved; approves the PR if that clears the last active finding and you are OWNER/MEMBER)
          - `/ai-pr-review dismiss F<n>` — dismiss a **body-level** finding by its stable ID (e.g. `/ai-pr-review dismiss F1`); IDs appear in the **`### Findings not attached to specific lines`** section. IDs are stable across review cycles — `F1` always refers to the same finding on this PR.
          - `/ai-pr-review false-positive [F<n>] [reason]` — record finding as false positive in the learning loop; use `F<n>` for body-level findings; a reply on an inline finding also resolves the thread and dismisses/approves like `dismiss`
          - `/ai-pr-review wont-fix [F<n>] [reason]` — record finding as intentional in the learning loop; use `F<n>` for body-level findings; a reply on an inline finding also resolves the thread and dismisses/approves like `dismiss`
          - `/ai-pr-review feedback <text>` — store free-form feedback in the learning loop
          - `/ai-pr-review explain [F<n>]` — request a detailed explanation from the originating agent; use `F<n>` for body-level findings
          - `/ai-pr-review revise [F<n>] <hint>` — request the agent to revise its finding with a hint; use `F<n>` for body-level findings
          - `/ai-pr-review help` — show this message
          HELP
          )"

      - name: Add skip label
        if: steps.cmd.outputs.command == 'skip'
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          gh pr edit "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --add-label skip-ai-review

      - name: Checkout PR head
        if: |
          steps.cmd.outputs.command == 'rescan' ||
          steps.cmd.outputs.command == 'review-full'
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.repository }}
          ref: refs/pull/${{ inputs.issue-number }}/head
          fetch-depth: 0
          token: ${{ secrets.actions-token || github.token }}

      - name: Get PR metadata
        if: |
          steps.cmd.outputs.command == 'rescan' ||
          steps.cmd.outputs.command == 'review-full'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          pr_json=$(gh pr view "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --json baseRefName,headRefOid)
          echo "base=$(echo "$pr_json" | jq -r .baseRefName)" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo  "$pr_json" | jq -r .headRefOid)"  >> "$GITHUB_OUTPUT"

      - name: React — launching
        if: |
          steps.cmd.outputs.command == 'rescan' ||
          steps.cmd.outputs.command == 'review-full'
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=rocket

      - name: Run review (rescan)
        if: steps.cmd.outputs.command == 'rescan'
        uses: tag1consulting/ai-pr-review/container-action@main
        env:
          FORCE_FULL_DIFF: 'true'
        with:
          image-tag: ${{ inputs.image-tag }}
          provider: ${{ inputs.provider }}
          api-key: ${{ secrets.api-key }}
          base-url: ${{ inputs.base-url }}
          # actions-token (GITHUB_TOKEN), not github-token (PAT): this posts
          # the review summary + inline findings, which must attribute to
          # github-actions[bot] like the automatic review job does. The PAT
          # is reserved for the dismiss command's resolveReviewThread mutation
          # (see #608).
          github-token: ${{ secrets.actions-token || github.token }}
          pr-number: ${{ inputs.issue-number }}
          base-ref: ${{ steps.pr.outputs.base }}
          head-sha: ${{ steps.pr.outputs.sha }}
          review-mode: ${{ inputs.review-mode-default }}
          analyzers: ${{ inputs.analyzers }}
          exclude-analyzers: ${{ inputs.exclude-analyzers }}
          agents: ${{ inputs.agents }}
          exclude-agents: ${{ inputs.exclude-agents }}

      - name: Run review (review-full)
        if: steps.cmd.outputs.command == 'review-full'
        uses: tag1consulting/ai-pr-review/container-action@main
        env:
          FORCE_FULL_DIFF: 'true'
        with:
          image-tag: ${{ inputs.image-tag }}
          provider: ${{ inputs.provider }}
          api-key: ${{ secrets.api-key }}
          base-url: ${{ inputs.base-url }}
          # actions-token (GITHUB_TOKEN), not github-token (PAT): see rationale
          # on the rescan step above (#608).
          github-token: ${{ secrets.actions-token || github.token }}
          pr-number: ${{ inputs.issue-number }}
          base-ref: ${{ steps.pr.outputs.base }}
          head-sha: ${{ steps.pr.outputs.sha }}
          review-mode: 'full'
          analyzers: ${{ inputs.analyzers }}
          exclude-analyzers: ${{ inputs.exclude-analyzers }}
          agents: ${{ inputs.agents }}
          exclude-agents: ${{ inputs.exclude-agents }}

      - name: React — done
        if: |
          success() && (
            steps.cmd.outputs.command == 'rescan' ||
            steps.cmd.outputs.command == 'review-full'
          )
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content="+1"

      - name: React — failed
        if: |
          failure() && (
            steps.cmd.outputs.command == 'rescan' ||
            steps.cmd.outputs.command == 'review-full'
          )
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=confused

  # ---------------------------------------------------------------------------
  # Dismiss a finding by stable ID from a top-level PR comment.
  #
  # Triggered by "/ai-pr-review dismiss F<n>" as a regular PR comment
  # (issue_comment event). Handles BOTH kinds of finding:
  #   - Body-level (in the "### Findings not attached to specific lines"
  #     section, no inline thread): matched in the review body and recorded.
  #   - Inline (anchored to a diff line, `[F<n>]` shown on the thread comment):
  #     the body lookup misses it, the id-map check confirms it is inline, and
  #     the "Resolve inline finding by F-ID" step locates the thread by its
  #     **[F<n>]** token, resolves it, and dismisses the review if it was the
  #     last open one. This is the top-level-comment equivalent of replying on
  #     the thread (handled by the separate dismiss-finding job).
  #
  # When no ID is given ("/ai-pr-review dismiss" with no F<n>), posts an
  # inline reply naming the active IDs instead of silently no-op'ing.
  #
  # If the dismissed finding was the last unresolved finding, the
  # CHANGES_REQUESTED review is dismissed automatically.
  # ---------------------------------------------------------------------------
  dismiss-body-finding:
    if: |
      inputs.event-name == 'issue_comment' &&
      inputs.is-pull-request == 'true' &&
      contains(fromJSON('["dismiss","false-positive","wont-fix","explain","revise"]'), needs.handle-command.outputs.command) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), inputs.comment-author-association)
    needs: handle-command
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tag1consulting/ai-pr-review:${{ inputs.image-tag }}
    defaults:
      run:
        shell: bash
    steps:
      - name: React — seen
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=eyes

      - name: Lookup body finding or list active IDs (explain/revise only)
        # Only explain/revise reach this step now — dismiss/false-positive/wont-fix
        # are handled by the "Invoke Python dismiss handler" step below, which
        # runs ai_pr_review.slash.dismiss's pytest-covered classification instead
        # of this bash re-implementation. Kept for explain/revise because their
        # "valid" gate (does F<n> exist?) still lives here; porting those two
        # stub commands is out of scope for this story (see story 13-2 Dev Notes).
        id: lookup
        if: contains(fromJSON('["explain","revise"]'), needs.handle-command.outputs.command)
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          OWNER: ${{ inputs.repository-owner }}
          REPO: ${{ inputs.repository-name }}
          PR_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          ACTOR: ${{ inputs.actor-login }}
          FINDING_ID: ${{ needs.handle-command.outputs.finding_id }}
          COMMAND: ${{ needs.handle-command.outputs.command || 'dismiss' }}
        run: |
          ab_err=$(mktemp)
          all_bodies=$(gh api \
            "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") |
                   select(.body != null and .body != "") |
                   .body]' 2>"$ab_err") || {
            echo "::warning::Could not fetch bot reviews for body-finding search: $(cat "$ab_err")" >&2
            all_bodies="[]"
          }
          rm -f "$ab_err"

          if [[ -z "$FINDING_ID" ]]; then
            nb_err=$(mktemp)
            trap 'rm -f "$nb_err"' EXIT
            newest_body=$(gh api \
              "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
              --jq '[.[] | select(.user.login == "github-actions[bot]") |
                     select(.state == "CHANGES_REQUESTED") |
                     select(.body != null and .body != "")] |
                     sort_by(.id) | last | .body // ""' 2>"$nb_err") || {
              echo "::warning::Could not fetch bot reviews to list active finding IDs: $(cat "$nb_err")" >&2
              newest_body=""
            }
            rm -f "$nb_err"
            reply_body=""
            if [[ -n "$newest_body" ]]; then
              id_list=$(printf '%s\n' "$newest_body" \
                | awk '
                    /### Findings not attached to specific lines/{p=1;next}
                    /Out-of-diff analyzer findings/{p=1;next}
                    /^###/{p=0}
                    /<\/details>/{p=0}
                    p' \
                | grep -oE '\*\*\[F[0-9]+\]\*\*' | grep -oE '[0-9]+' \
                | sort -n | uniq | sed 's/^/F/' | tr '\n' ' ' | sed 's/ $//' || true)
              if [[ -n "$id_list" ]]; then
                reply_body="$(printf '%s\n\n%s\n\n%s\n\n%s' \
                  "**AI Review**: to act on a body-level finding, include its ID. Active body-level IDs in the current review: **${id_list}**" \
                  "Example: \`/ai-pr-review ${COMMAND} F1\`" \
                  "These IDs are stable across review cycles -- \`F1\` always refers to the same finding on this PR." \
                  "**Inline** findings (anchored to a diff line) can also be dismissed by ID from here -- e.g. \`/ai-pr-review ${COMMAND} F<n>\` using the \`[F<n>]\` shown on the inline comment -- or by replying directly to the comment thread.")"
              else
                reply_body="**AI Review**: no body-level findings with stable IDs found in the current review. To act on an inline finding, reply directly to its comment thread with \`/ai-pr-review ${COMMAND}\`."
              fi
            else
              reply_body="**AI Review**: no active AI review with body-level findings found on this PR. To act on an inline finding, reply directly to its comment thread with \`/ai-pr-review ${COMMAND}\`."
            fi
            gh pr comment "$ISSUE_NUMBER" \
              --repo "$REPOSITORY" \
              --body "$reply_body"
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          search_script=$(mktemp --suffix=.py) || { echo "::error::mktemp failed for body-finding search script" >&2; exit 1; }
          search_err=$(mktemp)
          printf '%s\n' \
            "import json, os, re, sys" \
            "" \
            "fid = os.environ['FINDING_ID']" \
            "bodies = json.load(sys.stdin)" \
            "section_pat = re.compile(r'### Findings not attached to specific lines(.*?)(?=\n###|\Z)', re.DOTALL)" \
            "ood_pat = re.compile(r'Out-of-diff analyzer findings.*?</summary>(.*?)</details>', re.DOTALL)" \
            "f_token = f'**[F{fid}]**'" \
            "" \
            "for body in bodies:" \
            "    for section in section_pat.findall(body) + ood_pat.findall(body):" \
            "        for line in section.splitlines():" \
            "            if f_token in line:" \
            "                print(line)" \
            "                sys.exit(0)" \
            > "$search_script"
          matching_line=$(printf '%s' "$all_bodies" | FINDING_ID="$FINDING_ID" python3 "$search_script" 2>"$search_err") || true
          if [[ -s "$search_err" ]]; then
            echo "::warning::body-finding search failed: $(cat "$search_err")" >&2
            matching_line=""
          fi
          rm -f "$search_script" "$search_err"

          if [[ -z "$matching_line" ]]; then
            id_in_marker="no"
            py_script=$(mktemp --suffix=.py) || { echo "::error::mktemp failed for id-map check script" >&2; exit 1; }
            py_err=$(mktemp)
            printf '%s\n' \
              "import json,os,sys,re" \
              "bodies=json.load(sys.stdin)" \
              "fid=int(os.environ['FINDING_ID'])" \
              "pat=re.compile(r'<!-- ai-pr-review-id-map: ({.*?}) -->',re.DOTALL)" \
              "for body in bodies:" \
              "    m=pat.search(body)" \
              "    if not m: continue" \
              "    try:" \
              "        d=json.loads(m.group(1))" \
              "        if any(int(v)==fid for v in d.values()): print('yes'); sys.exit(0)" \
              "    except Exception: pass" \
              "print('no')" \
              > "$py_script"
            id_in_marker=$(printf '%s' "$all_bodies" | FINDING_ID="$FINDING_ID" \
              python3 "$py_script" 2>"$py_err") || true
            if [[ -s "$py_err" ]]; then
              echo "::warning::id-map check failed: $(cat "$py_err")" >&2
              id_in_marker="no"
            fi
            if [[ -z "$id_in_marker" ]]; then
              echo "::warning::id-map python check returned empty output; treating as no" >&2
              id_in_marker="no"
            fi
            rm -f "$py_script" "$py_err"
            if [[ "$id_in_marker" == "yes" ]]; then
              echo "valid=true" >> "$GITHUB_OUTPUT"
            else
              gh pr comment "$ISSUE_NUMBER" \
                --repo "$REPOSITORY" \
                --body "**AI Review**: F${FINDING_ID} was not found in any review on this PR. It may have already been resolved, or the ID may be incorrect. To see active body-level IDs, post \`/ai-pr-review ${COMMAND}\` (without an ID)."
              echo "valid=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Invoke Python dismiss handler
        id: dismiss
        if: contains(fromJSON('["dismiss","false-positive","wont-fix"]'), needs.handle-command.outputs.command)
        env:
          SLASH_FINDING_ID: ${{ needs.handle-command.outputs.finding_id }}
          SLASH_ACTOR: ${{ inputs.actor-login }}
          SLASH_COMMAND: ${{ needs.handle-command.outputs.command }}
          SLASH_PR_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          SLASH_COMMENT_BODY: ${{ inputs.comment-body }}
          AI_FEEDBACK_LOOP: ${{ inputs.enable-feedback-loop }}
          GITHUB_REPOSITORY: ${{ inputs.repository }}
          GH_TOKEN: ${{ secrets.github-token }}
          VCS_PROVIDER: 'github'
        run: |
          set +e
          reply=$(ai-pr-review dismiss 2>/tmp/dismiss-stderr)
          exit_code=$?
          stderr_content=$(cat /tmp/dismiss-stderr)
          if [[ -n "$stderr_content" ]]; then
            echo "$stderr_content" >&2
          fi
          if [[ $exit_code -ne 0 ]]; then
            echo "::error::dismiss handler exited $exit_code"
            exit $exit_code
          fi
          # Default to confused: if the handler exits 0 without ever emitting
          # the marker (e.g. a code path added later that forgets to), this
          # fails visibly as a wrong reaction rather than silently reporting
          # success.
          reaction="confused"
          if grep -q '^::notice::reaction=done$' /tmp/dismiss-stderr; then
            reaction="done"
          fi
          echo "reaction=${reaction}" >> "$GITHUB_OUTPUT"
          encoded=$(printf '%s' "$reply" | base64 -w0)
          echo "reply_b64=${encoded}" >> "$GITHUB_OUTPUT"

      - name: Post dismiss reply
        if: steps.dismiss.outcome == 'success' && contains(fromJSON('["dismiss","false-positive","wont-fix"]'), needs.handle-command.outputs.command)
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          REPLY_B64: ${{ steps.dismiss.outputs.reply_b64 }}
        run: |
          set -e
          reply_file=$(mktemp)
          trap 'rm -f "$reply_file"' EXIT
          if ! echo "$REPLY_B64" | base64 -d > "$reply_file"; then
            echo "::error::Failed to decode reply body from the dismiss handler."
            exit 1
          fi
          if [[ ! -s "$reply_file" ]]; then
            echo "::error::Decoded reply body is empty; refusing to post a blank reply."
            exit 1
          fi
          gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body-file "$reply_file"

      - name: React — dismiss outcome
        if: steps.dismiss.outcome == 'success' && contains(fromJSON('["dismiss","false-positive","wont-fix"]'), needs.handle-command.outputs.command)
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REACTION: ${{ steps.dismiss.outputs.reaction == 'confused' && 'confused' || '+1' }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content="$REACTION"

      - name: React — done (explain/revise)
        # dismiss/false-positive/wont-fix get their reaction and reply from
        # the "React — dismiss outcome" / "Post dismiss reply" steps above —
        # steps.lookup.outputs.valid is only ever set for explain/revise now.
        if: steps.lookup.outputs.valid == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          ISSUE_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          FINDING_ID: ${{ needs.handle-command.outputs.finding_id }}
          COMMAND: ${{ needs.handle-command.outputs.command }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content="+1"
          case "$COMMAND" in
            explain)
              gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
                --body "**AI Review**: explanation re-invocation for F${FINDING_ID} is not yet implemented. Please file an issue or open a discussion if you need more detail."
              ;;
            revise)
              gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
                --body "**AI Review**: revision for F${FINDING_ID} is not yet implemented. Please file an issue or open a discussion if you would like this feature."
              ;;
          esac

      - name: React — not applicable (no ID given)
        # valid == 'false' covers two cases: a genuine no-op (ID not found / no
        # ID given) and the inline-by-F-ID case, which is handled successfully by
        # the "Resolve inline finding by F-ID" step above. Only react 😕 for the
        # genuine no-op — i.e. when inline_fid was NOT set.
        if: steps.lookup.outputs.valid == 'false' && steps.lookup.outputs.inline_fid == ''
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=confused

  # ---------------------------------------------------------------------------
  # Dismiss a single false-positive finding.
  #
  # Triggered by replying to an inline review comment with
  # "/ai-pr-review dismiss", "false-positive", or "wont-fix" (issue #589 --
  # false-positive/wont-fix previously only reached feedback-command below,
  # whose resolve-on-success step deliberately never dismisses the owning
  # review; this job is the one that does). Resolves only the thread the user
  # replied to. If that was the last unresolved thread on the review, the
  # CHANGES_REQUESTED review is dismissed automatically. If OWNER/MEMBER and
  # this cleared the last active finding PR-wide, the PR is also approved
  # (issue #590) -- see the "Invoke Python dismiss-inline handler" step.
  # ---------------------------------------------------------------------------
  dismiss-finding:
    if: |
      inputs.event-name == 'pull_request_review_comment' &&
      (startsWith(inputs.comment-body, '/ai-pr-review dismiss') ||
       startsWith(inputs.comment-body, '/ai-pr-review false-positive') ||
       startsWith(inputs.comment-body, '/ai-pr-review wont-fix')) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), inputs.comment-author-association)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tag1consulting/ai-pr-review:${{ inputs.image-tag }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Parse command
        id: cmd
        env:
          COMMENT: ${{ inputs.comment-body }}
        run: |
          command=$(echo "$COMMENT" | head -1 | tr -d '\r' | awk '{print $2}')
          echo "command=$command" >> "$GITHUB_OUTPUT"

      - name: React — seen
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/pulls/comments/${COMMENT_ID}/reactions" \
            -f content=eyes

      - name: Validate parent comment is from the bot
        id: validate
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          IN_REPLY_TO_ID: ${{ inputs.in-reply-to-id }}
        run: |
          parent_id="${IN_REPLY_TO_ID}"
          if [[ -z "$parent_id" || "$parent_id" == "0" ]]; then
            echo "::error::This command must be used as a reply to an AI review finding."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          parent_json=$(gh api \
            "repos/${REPOSITORY}/pulls/comments/${parent_id}" \
            --jq '{login: .user.login, review_id: .pull_request_review_id}' 2>/dev/null) || {
            echo "::error::Could not fetch parent comment."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          }

          parent_author=$(echo "$parent_json" | jq -r '.login')
          review_id=$(echo "$parent_json" | jq -r '.review_id')

          if [[ "$parent_author" != "github-actions[bot]" ]]; then
            echo "::error::The parent comment is not from the AI reviewer (author: ${parent_author})."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "parent_id=${parent_id}" >> "$GITHUB_OUTPUT"
          echo "review_id=${review_id}" >> "$GITHUB_OUTPUT"
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Invoke Python dismiss-inline handler
        id: dismiss
        if: steps.validate.outputs.valid == 'true'
        env:
          SLASH_IN_REPLY_TO_ID: ${{ steps.validate.outputs.parent_id }}
          SLASH_REVIEW_ID: ${{ steps.validate.outputs.review_id }}
          SLASH_ACTOR: ${{ inputs.actor-login }}
          SLASH_COMMAND: ${{ steps.cmd.outputs.command }}
          SLASH_PR_NUMBER: ${{ inputs.pr-number }}
          # Auto-approve (issue #590) is a stronger side effect than a single
          # dismiss, so it is gated at the OWNER/MEMBER bar feedback-command
          # already uses for its persistent learning-loop writes -- tighter
          # than this job's own OWNER/MEMBER/COLLABORATOR admission gate
          # above. A COLLABORATOR can still dismiss/false-positive/wont-fix
          # normally; they just never trigger the PR-wide auto-approve.
          SLASH_APPROVE_ALLOWED: ${{ contains(fromJSON('["OWNER","MEMBER"]'), inputs.comment-author-association) }}
          GITHUB_REPOSITORY: ${{ inputs.repository }}
          GH_TOKEN: ${{ secrets.github-token }}
          VCS_PROVIDER: 'github'
        run: |
          set +e
          reply=$(ai-pr-review dismiss-inline 2>/tmp/dismiss-inline-stderr)
          exit_code=$?
          stderr_content=$(cat /tmp/dismiss-inline-stderr)
          if [[ -n "$stderr_content" ]]; then
            echo "$stderr_content" >&2
          fi
          if [[ $exit_code -ne 0 ]]; then
            echo "::error::dismiss-inline handler exited $exit_code"
            exit $exit_code
          fi
          # Default to confused: if the handler exits 0 without ever emitting
          # the marker (e.g. a code path added later that forgets to), this
          # fails visibly as a wrong reaction rather than silently reporting
          # success.
          reaction="confused"
          if grep -q '^::notice::reaction=done$' /tmp/dismiss-inline-stderr; then
            reaction="done"
          fi
          echo "reaction=${reaction}" >> "$GITHUB_OUTPUT"
          encoded=$(printf '%s' "$reply" | base64 -w0)
          echo "reply_b64=${encoded}" >> "$GITHUB_OUTPUT"

      - name: Post dismiss reply
        if: steps.dismiss.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
          REPLY_B64: ${{ steps.dismiss.outputs.reply_b64 }}
        run: |
          set -e
          reply_file=$(mktemp)
          trap 'rm -f "$reply_file"' EXIT
          if ! echo "$REPLY_B64" | base64 -d > "$reply_file"; then
            echo "::error::Failed to decode reply body from the dismiss-inline handler."
            exit 1
          fi
          if [[ ! -s "$reply_file" ]]; then
            echo "::error::Decoded reply body is empty; refusing to post a blank reply."
            exit 1
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$reply_file"

      - name: React — dismiss outcome
        if: steps.dismiss.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REACTION: ${{ steps.dismiss.outputs.reaction == 'confused' && 'confused' || '+1' }}
        run: |
          gh api \
            "repos/${REPOSITORY}/pulls/comments/${COMMENT_ID}/reactions" \
            -f content="$REACTION"

      - name: React — not applicable
        if: steps.validate.outputs.valid == 'false'
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/pulls/comments/${COMMENT_ID}/reactions" \
            -f content=confused

      - name: React — failed
        if: steps.validate.outputs.valid == 'true' && failure()
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/pulls/comments/${COMMENT_ID}/reactions" \
            -f content=confused

  # ---------------------------------------------------------------------------
  # Capability C: learning-loop feedback commands.
  #
  # Handles: /ai-pr-review false-positive [reason]
  #          /ai-pr-review wont-fix [reason]
  #          /ai-pr-review feedback <text>
  #          /ai-pr-review explain
  #          /ai-pr-review revise <hint>
  #
  # Runs the Python CLI `ai-pr-review slash` subcommand, which parses the
  # comment body, writes a FeedbackEntry to the GitBranchStore, and prints
  # a reply.  The reply is posted back to the comment thread and the thread
  # is resolved if the command is a feedback command.
  #
  # Requires AI_FEEDBACK_LOOP=true and a GH_TOKEN with contents:write on the
  # feedback branch (default: ai-pr-review-bot).
  # ---------------------------------------------------------------------------
  feedback-command:
    # Feedback commands write to a long-lived branch that influences every
    # future review repo-wide.  Restrict to OWNER and MEMBER only — the same
    # trust level GitHub uses to gate "approve workflow runs from forks".
    # COLLABORATOR is intentionally excluded for persistent side-effects.
    #
    # Accepts both event types:
    #   - issue_comment (PR comments)
    #   - pull_request_review_comment (replies on inline review threads)
    # because the natural UX for `/ai-pr-review false-positive` is to reply
    # on the AI's finding comment.  See #290.
    if: |
      inputs.enable-feedback-loop == 'true' &&
      startsWith(inputs.comment-body, '/ai-pr-review') &&
      contains(fromJSON('["OWNER","MEMBER"]'), inputs.comment-author-association) &&
      (inputs.event-name == 'pull_request_review_comment' ||
       (inputs.event-name == 'issue_comment' && inputs.is-pull-request == 'true'))
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tag1consulting/ai-pr-review:${{ inputs.image-tag }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Resolve event-type endpoints
        id: endpoints
        # GitHub uses two different REST API paths for comment reactions
        # depending on event type. Compute once, use everywhere. Also expose
        # a flag for the review-thread-specific steps.  The job-level `if:`
        # already restricts to two values, but defense-in-depth: bail if
        # we get an unexpected one rather than silently falling through.
        env:
          EVENT_NAME: ${{ inputs.event-name }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            echo "reactions_path=pulls/comments"  >> "$GITHUB_OUTPUT"
            echo "is_review_comment=true"         >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            echo "reactions_path=issues/comments" >> "$GITHUB_OUTPUT"
            echo "is_review_comment=false"        >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unrecognized event-name '${EVENT_NAME}'; refusing to dispatch feedback command."
            exit 1
          fi

      - name: React — seen
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REACTIONS_PATH: ${{ steps.endpoints.outputs.reactions_path }}
        run: |
          gh api \
            "repos/${REPOSITORY}/${REACTIONS_PATH}/${COMMENT_ID}/reactions" \
            -f content=eyes

      - name: Extract finding context
        # Look up source/file/rule_id for the FeedbackEntry: from the parent
        # inline comment (review-thread reply — the parent comment IS the AI
        # finding) or from an F<n> token in the comment body (top-level
        # comment). Ported from two bash steps (issue #554 phase 4) into
        # `ai-pr-review feedback-context`, unit-tested in
        # tests/python/slash/test_dismiss.py.
        #
        # All failure modes are best-effort: the FeedbackEntry is still
        # persisted (the reviewer's intent is captured) but with empty
        # context fields. For the review-thread-reply path, a
        # context_missing_reason is also exported so the reply step can
        # prepend a transparency note.
        id: context
        env:
          # actions-token, not github-token: this step only performs plain
          # REST GETs (fetch_review_comment, list_bot_reviews) — no
          # resolveReviewThread mutation or dismissal PUT, so it doesn't need
          # the elevated PAT (see the github-token input's description above).
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          GITHUB_REPOSITORY: ${{ inputs.repository }}
          VCS_PROVIDER: 'github'
          # This step runs on both event types (no is_review_comment gate);
          # pr-number is only populated for pull_request_review_comment
          # events, issue-number for issue_comment events — matching
          # dismiss-body-finding's identical fallback (see lines 584/619/656).
          SLASH_PR_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          SLASH_IS_REVIEW_COMMENT: ${{ steps.endpoints.outputs.is_review_comment }}
          SLASH_IN_REPLY_TO_ID: ${{ inputs.in-reply-to-id }}
          SLASH_COMMENT_BODY: ${{ inputs.comment-body }}
        run: ai-pr-review feedback-context >> "$GITHUB_OUTPUT"

      - name: Invoke Python slash handler
        id: handler
        env:
          SLASH_COMMENT_BODY: ${{ inputs.comment-body }}
          # Prefer wrapper-supplied context (legacy), else the context
          # auto-extracted above (covers both the review_comment and
          # issue_comment + F-ID paths — `feedback-context` unifies them).
          SLASH_SOURCE: ${{ inputs.finding-source || steps.context.outputs.source }}
          SLASH_FILE: ${{ inputs.finding-file || steps.context.outputs.file }}
          SLASH_RULE_ID: ${{ inputs.finding-rule-id || steps.context.outputs.rule_id }}
          # Forward extraction failure reason so the Python handler can flag
          # context_missing in extras without re-diagnosing the cause.
          SLASH_CONTEXT_MISSING_REASON: ${{ steps.context.outputs.context_missing_reason }}
          AI_FEEDBACK_LOOP: 'true'
          GITHUB_REPOSITORY: ${{ inputs.repository }}
          GH_TOKEN: ${{ secrets.github-token }}
          AI_PROVIDER: ${{ inputs.provider }}
          VCS_PROVIDER: 'github'
        run: |
          set +e
          reply=$(ai-pr-review slash 2>/tmp/slash-stderr)
          exit_code=$?
          stderr_content=$(cat /tmp/slash-stderr)
          if [[ -n "$stderr_content" ]]; then
            echo "$stderr_content" >&2
          fi
          if [[ $exit_code -eq 2 ]]; then
            echo "::notice::Not a recognized slash command; skipping."
            echo "is_command=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ $exit_code -ne 0 ]]; then
            echo "::error::slash handler exited $exit_code"
            echo "is_command=false" >> "$GITHUB_OUTPUT"
            exit $exit_code
          fi
          if [[ -z "$reply" ]]; then
            echo "is_command=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Encode reply so it survives multiline GITHUB_OUTPUT
          encoded=$(printf '%s' "$reply" | base64 -w0)
          echo "reply_b64=${encoded}" >> "$GITHUB_OUTPUT"
          echo "is_command=true" >> "$GITHUB_OUTPUT"

      - name: Post reply (review-thread)
        # Reply in-thread when triggered from a review-thread comment, so the
        # confirmation lands next to the AI finding the reviewer was acting on.
        if: |
          steps.handler.outputs.is_command == 'true' &&
          steps.endpoints.outputs.is_review_comment == 'true'
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REPLY_B64: ${{ steps.handler.outputs.reply_b64 }}
          CONTEXT_MISSING_REASON: ${{ steps.context.outputs.context_missing_reason }}
        run: |
          set -e
          reply_file=$(mktemp)
          # Trap covers both the base file and the transient .with-note copy
          # so we don't leak a temp file if the prepend pipeline below fails.
          trap 'rm -f "$reply_file" "${reply_file}.with-note"' EXIT
          # If base64 decode fails the file is empty; fail loudly instead of
          # silently POSTing a blank reply.
          if ! echo "$REPLY_B64" | base64 -d > "$reply_file"; then
            echo "::error::Failed to decode reply body from the slash handler."
            exit 1
          fi
          if [[ ! -s "$reply_file" ]]; then
            echo "::error::Decoded reply body is empty; refusing to post a blank reply."
            exit 1
          fi
          # Prepend a transparency note if context auto-extraction missed
          # something, so the reviewer knows their FeedbackEntry was persisted
          # without source/file/rule_id and isn't misled by the success reaction.
          if [[ -n "$CONTEXT_MISSING_REASON" ]]; then
            { printf '> ⚠️ **Note:** finding context was not auto-extracted (%s). The feedback was still persisted, but the entry will lack source/file/rule_id.\n\n' "$CONTEXT_MISSING_REASON"; cat "$reply_file"; } > "${reply_file}.with-note"
            mv "${reply_file}.with-note" "$reply_file"
          fi
          # gh has no built-in subcommand for review-comment replies; use the
          # REST API directly with --field "body=@file" so the body bypasses argv.
          gh api \
            --method POST \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments/${COMMENT_ID}/replies" \
            --field "body=@${reply_file}" \
            >/dev/null

      - name: Post reply (top-level)
        # When triggered from an issue_comment (top-level PR comment),
        # post the reply as a sibling top-level comment.
        if: |
          steps.handler.outputs.is_command == 'true' &&
          steps.endpoints.outputs.is_review_comment == 'false'
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          REPLY_B64: ${{ steps.handler.outputs.reply_b64 }}
        run: |
          # Write reply to a temp file and use --body-file so the body content
          # never becomes part of the gh command line. Defense-in-depth: the
          # Python handler already HTML-escapes user content, but body-file
          # ensures no part of the reply is parsed by the shell.
          set -e
          reply_file=$(mktemp)
          trap 'rm -f "$reply_file"' EXIT
          if ! echo "$REPLY_B64" | base64 -d > "$reply_file"; then
            echo "::error::Failed to decode reply body from the slash handler."
            exit 1
          fi
          if [[ ! -s "$reply_file" ]]; then
            echo "::error::Decoded reply body is empty; refusing to post a blank comment."
            exit 1
          fi
          gh pr comment "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --body-file "$reply_file"

      # NOTE (issue #589): a prior "Resolve review thread on success" step
      # lived here, calling `ai-pr-review resolve-thread` (resolve_only --
      # never dismisses the owning review) for false-positive/wont-fix
      # replies on an inline thread. That was the root of #589: resolve_only
      # is explicitly documented as never touching the owning review, so a
      # false-positive/wont-fix reply could never clear a CHANGES_REQUESTED
      # review the way `/ai-pr-review dismiss` could. The fix routes
      # false-positive/wont-fix review-thread replies through the
      # `dismiss-finding` job instead (same trigger condition, now widened to
      # match all three command names), which resolves the thread AND
      # dismisses the review AND (issue #590) approves the PR when
      # everything is now clear. `dismiss-finding` has no `needs:` on this
      # job, so both still react/reply independently for a review-thread
      # false-positive/wont-fix, but the persist-plus-resolve step below
      # remains this job's own responsibility (learning-loop storage);
      # dismiss-finding no longer needs duplicating here.

      - name: React — done
        if: steps.handler.outputs.is_command == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REACTIONS_PATH: ${{ steps.endpoints.outputs.reactions_path }}
        run: |
          gh api \
            "repos/${REPOSITORY}/${REACTIONS_PATH}/${COMMENT_ID}/reactions" \
            -f content="+1"

      - name: React — failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.actions-token || github.token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REACTIONS_PATH: ${{ steps.endpoints.outputs.reactions_path }}
        run: |
          gh api \
            "repos/${REPOSITORY}/${REACTIONS_PATH}/${COMMENT_ID}/reactions" \
            -f content=confused
