# Reusable workflow: AI PR Review slash commands
#
# Call this from a thin consumer workflow instead of copying 450+ lines
# of command-handling YAML. See examples/workflows/comment-triggers.yml
# for a ready-to-use consumer template.
#
# Supported commands (post as a PR comment):
#   /ai-pr-review rescan                      — force full diff, re-run review
#   /ai-pr-review review-full                 — run in full mode (all agents)
#   /ai-pr-review skip                        — add skip-ai-review label
#   /ai-pr-review dismiss                     — reply to a finding to mark it as false positive
#   /ai-pr-review false-positive [reason]     — record finding as false positive (learning loop)
#   /ai-pr-review wont-fix [reason]           — record finding as intentional (learning loop)
#   /ai-pr-review feedback <text>             — store free-form feedback (learning loop)
#   /ai-pr-review explain                     — request explanation from the originating agent
#   /ai-pr-review revise <hint>               — request agent revision with a hint
#   /ai-pr-review help                        — post the command list
#
# IMPORTANT: issue_comment and pull_request_review_comment workflows run
# from the default branch only. The consumer workflow that calls this must
# be merged to the default branch before commands will work.

name: AI PR Review — slash commands (reusable)

on:
  workflow_call:
    inputs:
      provider:
        description: 'LLM provider: anthropic | openai | openai-compatible | google | bedrock-proxy'
        type: string
        required: false
        default: 'anthropic'
      base-url:
        description: 'Base URL for openai-compatible or bedrock-proxy endpoints'
        type: string
        required: false
        default: ''
      image-tag:
        description: 'Container image tag (e.g. latest, 0.7.0)'
        type: string
        required: false
        default: 'latest'
      review-mode-default:
        description: 'Default review mode for rescan command (quick or full)'
        type: string
        required: false
        default: 'quick'
      analyzers:
        description: >
          Allowlist of static analyzer names to run (comma-separated). When set, only the
          listed analyzers run and exclude-analyzers is ignored. Empty (default): all
          eligible analyzers run. Valid names: shellcheck, trufflehog, semgrep, ruff,
          golangci-lint, hadolint, checkov, phpcs, phpstan, eslint, kube-linter, tflint,
          cve-check. Python engine only.
        type: string
        required: false
        default: ''
      exclude-analyzers:
        description: >
          Denylist of static analyzer names to skip (comma-separated). Ignored when
          analyzers (allowlist) is set. Empty (default): all eligible analyzers run. Valid
          names: shellcheck, trufflehog, semgrep, ruff, golangci-lint, hadolint, checkov,
          phpcs, phpstan, eslint, kube-linter, tflint, cve-check. Python engine only.
        type: string
        required: false
        default: ''
      agents:
        description: >
          Allowlist of review agent names to run (comma-separated). When set, only the
          listed agents run and exclude-agents is ignored. Gates (full_mode_only,
          conditional triggers) still apply on top. Empty (default): all eligible agents
          run. Valid names: pr-summarizer, code-reviewer, silent-failure-hunter,
          architecture-reviewer, security-reviewer, blind-hunter, edge-case-hunter,
          adversarial-general, issue-linker. Python engine only.
        type: string
        required: false
        default: ''
      exclude-agents:
        description: >
          Denylist of review agent names to skip (comma-separated). Ignored when agents
          (allowlist) is set. Excluding pr-summarizer suppresses the PR summary comment
          entirely. Empty (default): all eligible agents run. Valid names: pr-summarizer,
          code-reviewer, silent-failure-hunter, architecture-reviewer, security-reviewer,
          blind-hunter, edge-case-hunter, adversarial-general, issue-linker. Python engine
          only.
        type: string
        required: false
        default: ''
      # GitHub context — the caller must forward these from the event payload.
      # workflow_call does not propagate github.event to the callee.
      event-name:
        description: 'github.event_name from the caller'
        type: string
        required: true
      comment-body:
        description: 'The comment body text'
        type: string
        required: true
      comment-id:
        description: 'The comment database ID'
        type: string
        required: true
      comment-author-association:
        description: 'author_association of the commenter'
        type: string
        required: true
      issue-number:
        description: 'PR/issue number (from issue_comment events)'
        type: string
        required: false
        default: ''
      pr-number:
        description: 'PR number (from pull_request_review_comment events)'
        type: string
        required: false
        default: ''
      in-reply-to-id:
        description: 'Parent comment ID for dismiss (pull_request_review_comment only)'
        type: string
        required: false
        default: ''
      is-pull-request:
        description: 'Whether the issue_comment is on a PR (true/false)'
        type: string
        required: false
        default: 'false'
      repository:
        description: 'owner/repo string'
        type: string
        required: true
      repository-owner:
        description: 'Repository owner'
        type: string
        required: true
      repository-name:
        description: 'Repository name (without owner)'
        type: string
        required: true
      actor-login:
        description: 'Login of the user who posted the command'
        type: string
        required: false
        default: ''
      enable-feedback-loop:
        description: >
          Set to 'true' to enable Capability C learning-loop commands
          (false-positive, wont-fix, feedback, explain, revise). When false
          (default), the feedback-command job is skipped entirely.
        type: string
        required: false
        default: 'false'
      finding-source:
        description: 'Source tag of the finding being acted on (e.g. code-reviewer, sarif:bandit). Used by feedback-loop commands.'
        type: string
        required: false
        default: ''
      finding-file:
        description: 'File path the finding was on. Used by feedback-loop commands.'
        type: string
        required: false
        default: ''
      finding-rule-id:
        description: 'Rule ID of the finding (e.g. SARIF ruleId). Used by feedback-loop commands.'
        type: string
        required: false
        default: ''
    secrets:

      api-key:
        description: 'API key for the LLM provider'
        required: true
      github-token:
        description: >
          PAT (classic: repo scope, or fine-grained: pull_requests:write) or GitHub App
          token. Required ONLY for the dismiss command's resolveReviewThread GraphQL
          mutation and review-dismissal REST calls — plain GITHUB_TOKEN cannot call those
          on pull_request_review_comment events. All other replies and reactions use
          actions-token. See docs/slash-commands.md for setup instructions.
        required: true
      actions-token:
        description: >
          Built-in GITHUB_TOKEN (pass secrets.GITHUB_TOKEN / github.token from your
          caller). Used for all plain comment posting, reactions, reads, label changes,
          and checkout so those operations post as github-actions[bot].
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  handle-command:
    if: |
      inputs.event-name == 'issue_comment' &&
      inputs.is-pull-request == 'true' &&
      startsWith(inputs.comment-body, '/ai-pr-review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), inputs.comment-author-association)
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.cmd.outputs.command }}
      finding_id: ${{ steps.cmd.outputs.finding_id }}
    steps:
      - name: Parse command
        id: cmd
        env:
          COMMENT: ${{ inputs.comment-body }}
        run: |
          command=$(echo "$COMMENT" | head -1 | tr -d '\r' | awk '{print $2}')
          case "$command" in
            rescan|review-full|skip|help)
              echo "command=$command" >> "$GITHUB_OUTPUT"
              echo "valid=true"       >> "$GITHUB_OUTPUT"
              ;;
            dismiss|false-positive|wont-fix|explain|revise)
              # These commands accept an optional F<n> body-finding ID from a
              # top-level PR comment. Handled by dismiss-body-finding job.
              echo "command=$command" >> "$GITHUB_OUTPUT"
              echo "valid=true"       >> "$GITHUB_OUTPUT"
              # Extract optional finding ID (e.g. "F3" or "f3") from second token.
              # Validate strictly: must be F followed by 1-6 digits only (caps at F999999).
              second_token=$(echo "$COMMENT" | head -1 | tr -d '\r' | awk '{print $3}')
              if echo "$second_token" | grep -qiE '^F[0-9]{1,6}$'; then
                finding_num=$(echo "$second_token" | grep -oE '[0-9]{1,6}')
                echo "finding_id=${finding_num}" >> "$GITHUB_OUTPUT"
              else
                echo "finding_id=" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: React — seen
        if: steps.cmd.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=eyes

      - name: Reply with help text
        if: steps.cmd.outputs.command == 'help'
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          gh pr comment "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --body "$(cat <<'HELP'
          **AI PR Review commands:**
          - `/ai-pr-review rescan` — force full diff re-review
          - `/ai-pr-review review-full` — run all agents (full mode)
          - `/ai-pr-review skip` — suppress the next automated review
          - `/ai-pr-review dismiss` — reply to an **inline** finding to mark it as a false positive (resolves that thread; dismisses the review when all threads are resolved)
          - `/ai-pr-review dismiss F<n>` — dismiss a **body-level** finding by its stable ID (e.g. `/ai-pr-review dismiss F1`); IDs appear in the **`### Findings not attached to specific lines`** section. IDs are stable across review cycles — `F1` always refers to the same finding on this PR.
          - `/ai-pr-review false-positive [F<n>] [reason]` — record finding as false positive in the learning loop; use `F<n>` for body-level findings
          - `/ai-pr-review wont-fix [F<n>] [reason]` — record finding as intentional in the learning loop; use `F<n>` for body-level findings
          - `/ai-pr-review feedback <text>` — store free-form feedback in the learning loop
          - `/ai-pr-review explain [F<n>]` — request a detailed explanation from the originating agent; use `F<n>` for body-level findings
          - `/ai-pr-review revise [F<n>] <hint>` — request the agent to revise its finding with a hint; use `F<n>` for body-level findings
          - `/ai-pr-review help` — show this message
          HELP
          )"

      - name: Add skip label
        if: steps.cmd.outputs.command == 'skip'
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          gh pr edit "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --add-label skip-ai-review

      - name: Checkout PR head
        if: |
          steps.cmd.outputs.command == 'rescan' ||
          steps.cmd.outputs.command == 'review-full'
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository }}
          ref: refs/pull/${{ inputs.issue-number }}/head
          fetch-depth: 0
          token: ${{ secrets.actions-token }}

      - name: Get PR metadata
        if: |
          steps.cmd.outputs.command == 'rescan' ||
          steps.cmd.outputs.command == 'review-full'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          pr_json=$(gh pr view "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --json baseRefName,headRefOid)
          echo "base=$(echo "$pr_json" | jq -r .baseRefName)" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo  "$pr_json" | jq -r .headRefOid)"  >> "$GITHUB_OUTPUT"

      - name: React — launching
        if: |
          steps.cmd.outputs.command == 'rescan' ||
          steps.cmd.outputs.command == 'review-full'
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=rocket

      - name: Run review (rescan)
        if: steps.cmd.outputs.command == 'rescan'
        uses: tag1consulting/ai-pr-review/container-action@main
        env:
          FORCE_FULL_DIFF: 'true'
        with:
          image-tag: ${{ inputs.image-tag }}
          provider: ${{ inputs.provider }}
          api-key: ${{ secrets.api-key }}
          base-url: ${{ inputs.base-url }}
          github-token: ${{ secrets.github-token }}
          pr-number: ${{ inputs.issue-number }}
          base-ref: ${{ steps.pr.outputs.base }}
          head-sha: ${{ steps.pr.outputs.sha }}
          review-mode: ${{ inputs.review-mode-default }}
          analyzers: ${{ inputs.analyzers }}
          exclude-analyzers: ${{ inputs.exclude-analyzers }}
          agents: ${{ inputs.agents }}
          exclude-agents: ${{ inputs.exclude-agents }}

      - name: Run review (review-full)
        if: steps.cmd.outputs.command == 'review-full'
        uses: tag1consulting/ai-pr-review/container-action@main
        env:
          FORCE_FULL_DIFF: 'true'
        with:
          image-tag: ${{ inputs.image-tag }}
          provider: ${{ inputs.provider }}
          api-key: ${{ secrets.api-key }}
          base-url: ${{ inputs.base-url }}
          github-token: ${{ secrets.github-token }}
          pr-number: ${{ inputs.issue-number }}
          base-ref: ${{ steps.pr.outputs.base }}
          head-sha: ${{ steps.pr.outputs.sha }}
          review-mode: 'full'
          analyzers: ${{ inputs.analyzers }}
          exclude-analyzers: ${{ inputs.exclude-analyzers }}
          agents: ${{ inputs.agents }}
          exclude-agents: ${{ inputs.exclude-agents }}

      - name: React — done
        if: |
          success() && (
            steps.cmd.outputs.command == 'rescan' ||
            steps.cmd.outputs.command == 'review-full'
          )
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content="+1"

      - name: React — failed
        if: |
          failure() && (
            steps.cmd.outputs.command == 'rescan' ||
            steps.cmd.outputs.command == 'review-full'
          )
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=confused

  # ---------------------------------------------------------------------------
  # Dismiss a finding by stable ID from a top-level PR comment.
  #
  # Triggered by "/ai-pr-review dismiss F<n>" as a regular PR comment
  # (issue_comment event). Handles BOTH kinds of finding:
  #   - Body-level (in the "### Findings not attached to specific lines"
  #     section, no inline thread): matched in the review body and recorded.
  #   - Inline (anchored to a diff line, `[F<n>]` shown on the thread comment):
  #     the body lookup misses it, the id-map check confirms it is inline, and
  #     the "Resolve inline finding by F-ID" step locates the thread by its
  #     **[F<n>]** token, resolves it, and dismisses the review if it was the
  #     last open one. This is the top-level-comment equivalent of replying on
  #     the thread (handled by the separate dismiss-finding job).
  #
  # When no ID is given ("/ai-pr-review dismiss" with no F<n>), posts an
  # inline reply naming the active IDs instead of silently no-op'ing.
  #
  # If the dismissed finding was the last unresolved finding, the
  # CHANGES_REQUESTED review is dismissed automatically.
  # ---------------------------------------------------------------------------
  dismiss-body-finding:
    if: |
      inputs.event-name == 'issue_comment' &&
      inputs.is-pull-request == 'true' &&
      contains(fromJSON('["dismiss","false-positive","wont-fix","explain","revise"]'), needs.handle-command.outputs.command) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), inputs.comment-author-association)
    needs: handle-command
    runs-on: ubuntu-latest
    steps:
      - name: React — seen
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=eyes

      - name: Lookup body finding or list active IDs
        id: lookup
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          OWNER: ${{ inputs.repository-owner }}
          REPO: ${{ inputs.repository-name }}
          PR_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          ACTOR: ${{ inputs.actor-login }}
          FINDING_ID: ${{ needs.handle-command.outputs.finding_id }}
          COMMAND: ${{ needs.handle-command.outputs.command || 'dismiss' }}
        run: |
          # Fetch all bot review bodies to search for the finding ID.
          all_bodies=$(gh api \
            "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") |
                   select(.body != null and (.body | contains("### Findings not attached to specific lines"))) |
                   .body]' 2>/dev/null || echo "[]")

          if [[ -z "$FINDING_ID" ]]; then
            # No ID supplied — list active body-level IDs and show correct syntax
            # for the command that was issued (dismiss/false-positive/wont-fix/explain/revise).
            nb_err=$(mktemp)
            trap 'rm -f "$nb_err"' EXIT
            newest_body=$(gh api \
              "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
              --jq '[.[] | select(.user.login == "github-actions[bot]") |
                     select(.state == "CHANGES_REQUESTED") |
                     select(.body != null and (.body | contains("### Findings not attached to specific lines")))] |
                     sort_by(.id) | last | .body // ""' 2>"$nb_err") || {
              echo "::warning::Could not fetch bot reviews to list active finding IDs: $(cat "$nb_err")" >&2
              newest_body=""
            }
            rm -f "$nb_err"
            reply_body=""
            if [[ -n "$newest_body" ]]; then
              # Extract IDs only from the body-findings section (exact section, not full body).
              id_list=$(printf '%s\n' "$newest_body" \
                | awk '/### Findings not attached to specific lines/{p=1;next} /^###/{p=0} p' \
                | grep -oE '\*\*\[F[0-9]+\]\*\*' | grep -oE '[0-9]+' \
                | sort -n | uniq | sed 's/^/F/' | tr '\n' ' ' | sed 's/ $//' || true)
              if [[ -n "$id_list" ]]; then
                reply_body="$(printf '%s\n\n%s\n\n%s\n\n%s' \
                  "**AI Review**: to act on a body-level finding, include its ID. Active body-level IDs in the current review: **${id_list}**" \
                  "Example: \`/ai-pr-review ${COMMAND} F1\`" \
                  "These IDs are stable across review cycles -- \`F1\` always refers to the same finding on this PR." \
                  "**Inline** findings (anchored to a diff line) can also be dismissed by ID from here -- e.g. \`/ai-pr-review ${COMMAND} F<n>\` using the \`[F<n>]\` shown on the inline comment -- or by replying directly to the comment thread.")"
              else
                reply_body="**AI Review**: no body-level findings with stable IDs found in the current review. To act on an inline finding, reply directly to its comment thread with \`/ai-pr-review ${COMMAND}\`."
              fi
            else
              # No prior CHANGES_REQUESTED review found (fresh PR or API error) — still reply.
              reply_body="**AI Review**: no active AI review with body-level findings found on this PR. To act on an inline finding, reply directly to its comment thread with \`/ai-pr-review ${COMMAND}\`."
            fi
            gh pr comment "$ISSUE_NUMBER" \
              --repo "$REPOSITORY" \
              --body "$reply_body"
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Search all bot review body-sections for **[F{FINDING_ID}]**.
          # We only look within "### Findings not attached to specific lines"
          # sections — inline finding IDs live in thread comments, not review
          # bodies. If the ID is not found in a body section we fall through to
          # the inline-marker check below; when it matches an inline finding the
          # "Resolve inline finding by F-ID" step resolves that thread (and
          # dismisses the review if it was the last open one).
          pattern="\*\*\[F${FINDING_ID}\]\*\*"
          matching_line=""
          while IFS= read -r body_text; do
            in_section=false
            while IFS= read -r line; do
              if [[ "$line" == *"### Findings not attached to specific lines"* ]]; then
                in_section=true; continue
              fi
              if $in_section && [[ "$line" =~ ^"###" ]]; then
                in_section=false; continue
              fi
              $in_section || continue
              if echo "$line" | grep -qE "$pattern"; then
                matching_line="$line"
                break 2
              fi
            done <<< "$body_text"
          done < <(printf '%s\n' "$all_bodies" | jq -r '.[]')

          if [[ -z "$matching_line" ]]; then
            # Check if the ID exists in the full marker (i.e. it's an inline finding).
            # Pass the full bodies JSON to python3 via stdin to extract the marker
            # robustly — avoids regex truncation on fingerprints containing '>' or ' -->'.
            id_in_marker="no"
            py_script=$(mktemp --suffix=.py) || { echo "::error::mktemp failed for id-map check script" >&2; exit 1; }
            py_err=$(mktemp)
            # Write the script using printf to avoid YAML-hostile heredoc syntax.
            # F23: re.DOTALL so the pattern matches markers spanning newlines.
            # F24: pipe $all_bodies (a JSON array) directly so json.load() gets an array.
            printf '%s\n' \
              "import json,os,sys,re" \
              "bodies=json.load(sys.stdin)" \
              "fid=int(os.environ['FINDING_ID'])" \
              "pat=re.compile(r'<!-- ai-pr-review-id-map: ({.*?}) -->',re.DOTALL)" \
              "for body in bodies:" \
              "    m=pat.search(body)" \
              "    if not m: continue" \
              "    try:" \
              "        d=json.loads(m.group(1))" \
              "        if any(int(v)==fid for v in d.values()): print('yes'); sys.exit(0)" \
              "    except Exception: pass" \
              "print('no')" \
              > "$py_script"
            id_in_marker=$(printf '%s' "$all_bodies" | FINDING_ID="$FINDING_ID" \
              python3 "$py_script" 2>"$py_err") || true
            if [[ -s "$py_err" ]]; then
              echo "::warning::id-map check failed: $(cat "$py_err")" >&2
              id_in_marker="no"
            fi
            if [[ -z "$id_in_marker" ]]; then
              echo "::warning::id-map python check returned empty output; treating as no" >&2
              id_in_marker="no"
            fi
            rm -f "$py_script" "$py_err"
            if [[ "$id_in_marker" == "yes" ]]; then
              # F<n> is an INLINE finding. Rather than dead-ending and telling the
              # user to go reply on the thread (bad UX: dismiss-by-ID from the PR
              # conversation is documented), signal the resolve-inline step to
              # locate the thread by its **[F<n>]** token, resolve it, and dismiss
              # the review if it was the last unresolved thread. The reply is
              # posted by that step.
              echo "valid=false" >> "$GITHUB_OUTPUT"
              echo "inline_fid=${FINDING_ID}" >> "$GITHUB_OUTPUT"
            else
              gh pr comment "$ISSUE_NUMBER" \
                --repo "$REPOSITORY" \
                --body "**AI Review**: F${FINDING_ID} was not found in any review on this PR. It may have already been resolved, or the ID may be incorrect. To see active body-level IDs, post \`/ai-pr-review ${COMMAND}\` (without an ID)."
              echo "valid=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Extract source, file, line, and finding text for the feedback store.
          # Remove the F-token, then grab the first [...] group for the source.
          source=$(printf '%s' "$matching_line" \
            | sed 's/\*\*\[F[0-9]*\]\*\* //' \
            | grep -oE '\[[^]]+\]' | head -1 | tr -d '[]' \
            | sed 's/,.*//' | tr -d ' ' || true)
          # Extract the backtick-quoted location from *(at `file:line`...)* annotation.
          file_line=$(printf '%s' "$matching_line" \
            | grep -oE '\(at `[^`]+`' | head -1 | sed 's/(at `//;s/`.*//' || true)
          if [[ -z "$file_line" ]]; then
            # Fallback: em-dash prefix used in bash-engine renders (— `file:line`)
            file_line=$(printf '%s' "$matching_line" \
              | grep -oE '— `[^`]+' | head -1 | sed 's/— `//' || true)
          fi
          if [[ -z "$file_line" ]]; then
            echo "::warning::Could not extract file:line for finding F${FINDING_ID}; feedback entry will have empty file/line fields" >&2
          fi
          finding_file="${file_line%:*}"
          finding_line_num="${file_line##*:}"
          if ! [[ "$finding_line_num" =~ ^[0-9]+$ ]]; then
            finding_line_num=""
          fi

          # Finding text: content after source tag, before location annotation.
          finding_text=$(printf '%s' "$matching_line" \
            | sed 's/^- //' \
            | sed 's/[🚨🔴🟡🔵✅❔] //' \
            | sed 's/\*\*\[[^]]*\]\*\* //g' \
            | sed 's/\[[^]]*\] //' \
            | sed 's/ — `[^`]*`.*$//' \
            | sed 's/ \*(at `[^`]*`.*$//' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//') || true

          echo "valid=true"            >> "$GITHUB_OUTPUT"
          echo "source=${source}"      >> "$GITHUB_OUTPUT"
          echo "file=${finding_file}"  >> "$GITHUB_OUTPUT"
          echo "line=${finding_line_num}" >> "$GITHUB_OUTPUT"
          echo "finding_text=${finding_text}" >> "$GITHUB_OUTPUT"

      - name: Resolve inline finding by F-ID and dismiss review if last
        # Handles `/ai-pr-review dismiss F<n>` (or false-positive/wont-fix) issued
        # from a TOP-LEVEL PR comment where F<n> turns out to be an INLINE finding.
        # The body-level lookup sets inline_fid in that case. We locate the inline
        # thread by its rendered **[F<n>]** token (the token is present in the
        # thread comment body and is unique per PR), resolve it, and — if it was
        # the last unresolved bot thread — dismiss the CHANGES_REQUESTED review.
        if: |
          steps.lookup.outputs.inline_fid != '' &&
          contains(fromJSON('["dismiss","false-positive","wont-fix"]'), needs.handle-command.outputs.command)
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          OWNER: ${{ inputs.repository-owner }}
          REPO: ${{ inputs.repository-name }}
          PR_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          ACTOR: ${{ inputs.actor-login }}
          FINDING_ID: ${{ steps.lookup.outputs.inline_fid }}
          COMMAND: ${{ needs.handle-command.outputs.command }}
          # REST API form (github-actions[bot]) — used only for the
          # /pulls/{n}/reviews REST query below. Do NOT use this for GraphQL
          # reviewThreads author matching: GraphQL reports "github-actions"
          # (no [bot] suffix). Thread ownership is gated by the inline marker.
          BOT_LOGIN: 'github-actions[bot]'
        run: |
          # Validate the F-ID is a bare integer before using it in any pattern.
          if ! [[ "$FINDING_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::Refusing to act on non-numeric finding id '${FINDING_ID}'."
            exit 1
          fi
          if ! [[ "$ACTOR" =~ ^[a-zA-Z0-9][a-zA-Z0-9-]{0,38}(\[bot\])?$ ]]; then
            echo "::error::Refusing to dismiss: unexpected actor login '${ACTOR}'."
            exit 1
          fi

          # The rendered inline-comment token, e.g. "**[F1]**". Bot inline
          # comments carry both this token and the <!-- ai-pr-review-inline -->
          # marker; we require both plus bot authorship to avoid touching a
          # user's lookalike comment.
          ftoken="**[F${FINDING_ID}]**"

          # Page review threads; find the one whose first comment is bot-authored,
          # carries the inline marker, and contains the F-token. Capture its node
          # id and resolved state.
          cursor=""
          has_next=true
          thread_id=""
          thread_resolved=""
          while [[ "$has_next" == "true" && -z "$thread_id" ]]; do
            api_err=$(mktemp)
            page=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        isResolved
                        comments(first: 1) {
                          nodes { body author { login } }
                        }
                      }
                    }
                  }
                }
              }' \
              -f owner="$OWNER" -f repo="$REPO" -F pr="$PR_NUMBER" \
              ${cursor:+-f after="$cursor"} 2>"$api_err") || {
              echo "::error::Could not fetch review threads: $(cat "$api_err")"
              rm -f "$api_err"; exit 1
            }
            rm -f "$api_err"
            if printf '%s' "$page" | jq -e '.errors' >/dev/null 2>&1; then
              echo "::error::GraphQL errors fetching review threads: $(printf '%s' "$page" | jq -c '.errors')"
              exit 1
            fi

            # jq selects the matching thread: first comment body contains the
            # inline ownership marker AND the F-token (passed as --arg so the **
            # and [] are treated literally, never as regex). Ownership is gated
            # by the marker, NOT by author login: the GraphQL API reports the bot
            # author as "github-actions" while the REST API reports
            # "github-actions[bot]", so an author-login compare is unreliable
            # across APIs. The <!-- ai-pr-review-inline --> marker is the
            # canonical ownership signal (see ai_pr_review/vcs/marker.py) and is
            # only ever emitted on our own inline comments.
            match=$(printf '%s' "$page" | jq -r \
              --arg ftoken "$ftoken" \
              '.data.repository.pullRequest.reviewThreads.nodes[]
               | select(.comments.nodes[0].body | contains("<!-- ai-pr-review-inline -->"))
               | select(.comments.nodes[0].body | contains($ftoken))
               | "\(.id)\t\(.isResolved)"' | head -1)
            if [[ -n "$match" ]]; then
              thread_id="${match%%$'\t'*}"
              thread_resolved="${match##*$'\t'}"
            fi

            has_next=$(printf '%s' "$page" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            cursor=$(printf '%s' "$page" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // empty')
          done

          if [[ -z "$thread_id" ]]; then
            gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
              --body "**AI Review**: F${FINDING_ID} is an inline finding, but its review thread could not be located (it may already be resolved). No action taken."
            exit 0
          fi

          # Resolve the thread if not already resolved.
          if [[ "$thread_resolved" != "true" ]]; then
            mut_err=$(mktemp)
            mut=$(gh api graphql -f query='
              mutation($threadId: ID!) {
                resolveReviewThread(input: {threadId: $threadId}) {
                  thread { id isResolved }
                }
              }' -f threadId="$thread_id" 2>"$mut_err") || {
              echo "::error::Failed to resolve review thread: $(cat "$mut_err")"
              rm -f "$mut_err"; exit 1
            }
            rm -f "$mut_err"
            if printf '%s' "$mut" | jq -e '.errors' >/dev/null 2>&1; then
              echo "::error::GraphQL errors resolving thread: $(printf '%s' "$mut" | jq -c '.errors')"
              exit 1
            fi
            echo "Resolved thread ${thread_id} for F${FINDING_ID}." >&2
          else
            echo "Thread for F${FINDING_ID} was already resolved." >&2
          fi

          # Find the newest bot CHANGES_REQUESTED review.
          newest=$(gh api \
            "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            --jq "[.[] | select(.user.login == \"${BOT_LOGIN}\") |
                   select(.state == \"CHANGES_REQUESTED\")] | sort_by(.id) | last" \
            2>/dev/null || echo "null")
          if [[ "$newest" == "null" || -z "$newest" ]]; then
            review_id=""
          else
            review_id=$(printf '%s' "$newest" | jq -r '.id')
          fi

          # Count remaining UNRESOLVED bot inline threads across the PR.
          cursor=""
          has_next=true
          unresolved=0
          while [[ "$has_next" == "true" ]]; do
            api_err=$(mktemp)
            page=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        isResolved
                        comments(first: 1) {
                          nodes { body author { login } }
                        }
                      }
                    }
                  }
                }
              }' \
              -f owner="$OWNER" -f repo="$REPO" -F pr="$PR_NUMBER" \
              ${cursor:+-f after="$cursor"} 2>"$api_err") || {
              echo "::warning::Could not recount threads; leaving review state unchanged: $(cat "$api_err")" >&2
              rm -f "$api_err"; exit 0
            }
            rm -f "$api_err"
            # Ownership gated by the inline marker, not author login (GraphQL
            # reports "github-actions", REST reports "github-actions[bot]").
            n=$(printf '%s' "$page" | jq \
              '[.data.repository.pullRequest.reviewThreads.nodes[]
                | select(.comments.nodes[0].body | contains("<!-- ai-pr-review-inline -->"))
                | select(.isResolved == false)] | length')
            unresolved=$((unresolved + n))
            has_next=$(printf '%s' "$page" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            cursor=$(printf '%s' "$page" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // empty')
          done

          if [[ "$unresolved" -gt 0 ]]; then
            gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
              --body "**AI Review**: F${FINDING_ID} resolved. ${unresolved} inline finding(s) still unresolved; the review stays *changes requested* until they are addressed or dismissed."
            exit 0
          fi

          if [[ -z "$review_id" ]]; then
            gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
              --body "**AI Review**: F${FINDING_ID} resolved. All inline findings are resolved; no open *changes requested* review to dismiss."
            exit 0
          fi

          dismiss_msg="All findings resolved — dismissed by @${ACTOR}."
          if gh api \
            "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews/${review_id}/dismissals" \
            --method PUT --field "message=${dismiss_msg}" >/dev/null 2>&1; then
            gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
              --body "**AI Review**: F${FINDING_ID} resolved. All inline findings are now resolved — the *changes requested* review has been dismissed."
          else
            gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
              --body "**AI Review**: F${FINDING_ID} resolved, but the *changes requested* review could not be dismissed automatically (it may already be dismissed, or the token lacks scope)."
          fi

      - name: Record false-positive in feedback store
        # Only the body-level path (valid == 'true') records here, because only
        # it populates source/file/line/finding_text. The inline-by-F-ID path
        # (inline_fid set) deliberately does NOT record here — its source/file
        # outputs are empty, which would persist a malformed entry. The verdict
        # for that path is already persisted by the separate feedback-command
        # job, which runs for the same top-level issue_comment event.
        if: |
          steps.lookup.outputs.valid == 'true' &&
          inputs.enable-feedback-loop == 'true' &&
          !contains(fromJSON('["explain","revise"]'), needs.handle-command.outputs.command)
        uses: tag1consulting/ai-pr-review/container-action@main
        with:
          image-tag: ${{ inputs.image-tag }}
          provider: ${{ inputs.provider }}
          api-key: ${{ secrets.api-key }}
          base-url: ${{ inputs.base-url }}
          github-token: ${{ secrets.github-token }}
          pr-number: ${{ inputs.pr-number || inputs.issue-number }}
          base-ref: ''
          head-sha: ''
          review-mode: 'skip'
        env:
          SLASH_COMMAND: ${{ needs.handle-command.outputs.command }}
          SLASH_SOURCE: ${{ steps.lookup.outputs.source }}
          SLASH_FILE: ${{ steps.lookup.outputs.file }}
          SLASH_RULE_ID: ''
          SLASH_COMMENT_BODY: ${{ inputs.comment-body }}
          SLASH_PR_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          SLASH_COMMENT_ID: ${{ inputs.comment-id }}
          SLASH_ACTOR: ${{ inputs.actor-login }}

      - name: Dismiss CHANGES_REQUESTED review if all findings resolved
        if: |
          steps.lookup.outputs.valid == 'true' &&
          contains(fromJSON('["dismiss","false-positive","wont-fix"]'), needs.handle-command.outputs.command)
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          OWNER: ${{ inputs.repository-owner }}
          REPO: ${{ inputs.repository-name }}
          PR_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          ACTOR: ${{ inputs.actor-login }}
        run: |
          # Find the newest bot CHANGES_REQUESTED review.
          newest=$(gh api \
            "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") |
                   select(.state == "CHANGES_REQUESTED")] | sort_by(.id) | last' 2>/dev/null || echo "null")
          if [[ "$newest" == "null" || -z "$newest" ]]; then
            echo "No bot CHANGES_REQUESTED review found; nothing to dismiss." >&2
            exit 0
          fi
          review_id=$(printf '%s' "$newest" | jq -r '.id')

          # Check for unresolved inline threads on this review.
          cursor=""
          has_next=true
          unresolved_inline=0
          while [[ "$has_next" == "true" ]]; do
            gql_err=$(mktemp)
            page=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        isResolved
                        comments(first: 1) {
                          nodes { pullRequestReview { databaseId } }
                        }
                      }
                    }
                  }
                }
              }' \
              -f owner="$OWNER" -f repo="$REPO" -F pr="$PR_NUMBER" \
              ${cursor:+-f after="$cursor"} 2>"$gql_err") || {
              echo "::error::Could not fetch review threads for dismissal check: $(cat "$gql_err")"
              rm -f "$gql_err"
              exit 1
            }
            rm -f "$gql_err"
            if printf '%s' "$page" | jq -e '.errors' >/dev/null 2>&1; then
              echo "::error::GraphQL errors fetching review threads: $(printf '%s' "$page" | jq -c '.errors')"
              exit 1
            fi
            # mktemp + explicit rm -f in both success and error paths — no EXIT trap
            # because this is inside a loop; a trap would only clean the last iteration's
            # file, leaking all previous iterations' temp files.
            jq_err=$(mktemp)
            threads=$(printf '%s' "$page" | jq \
              --argjson rid "$review_id" \
              '[.data.repository.pullRequest.reviewThreads.nodes[] |
                select(.comments.nodes[0].pullRequestReview.databaseId == $rid and
                       .isResolved == false)] | length' 2>"$jq_err") || {
              echo "::error::jq failed parsing review threads response: $(cat "$jq_err")"
              rm -f "$jq_err"
              exit 1
            }
            rm -f "$jq_err"
            unresolved_inline=$((unresolved_inline + threads))
            has_next=$(printf '%s' "$page" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            cursor=$(printf '%s' "$page" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // empty')
          done

          # Count remaining body-level findings in the newest review body
          # that have NOT been dismissed (i.e. no feedback entry for them).
          # Heuristic: any **[F<n>]** still visible in the current review body.
          # After a dismiss, the finding is suppressed on the next re-run — but
          # the review body is static. We track dismissed IDs via the feedback
          # store, so here we simply skip this check and let the next re-run
          # clean up. Dismiss the review only if all inline threads are resolved.
          if [[ "$unresolved_inline" -gt 0 ]]; then
            echo "${unresolved_inline} unresolved inline thread(s) remain; keeping CHANGES_REQUESTED." >&2
            exit 0
          fi

          if ! [[ "$ACTOR" =~ ^[a-zA-Z0-9][a-zA-Z0-9-]{0,38}(\[bot\])?$ ]]; then
            echo "::error::Refusing to dismiss: unexpected actor login '${ACTOR}'."
            exit 1
          fi
          dismiss_msg="All findings resolved — dismissed by @${ACTOR}."
          if gh api \
            "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews/${review_id}/dismissals" \
            --method PUT \
            --field "message=${dismiss_msg}" \
            >/dev/null 2>&1; then
            echo "Dismissed review #${review_id}." >&2
          else
            echo "::warning::Could not dismiss review #${review_id} (may already be resolved or token lacks scope)." >&2
          fi

      - name: React — done
        if: steps.lookup.outputs.valid == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          ISSUE_NUMBER: ${{ inputs.pr-number || inputs.issue-number }}
          FINDING_ID: ${{ needs.handle-command.outputs.finding_id }}
          COMMAND: ${{ needs.handle-command.outputs.command }}
          ENABLE_FEEDBACK_LOOP: ${{ inputs.enable-feedback-loop }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content="+1"
          persisted_note=""
          if [[ "$ENABLE_FEEDBACK_LOOP" != "true" ]]; then
            persisted_note=" (feedback loop disabled — not persisted to learning store)"
          fi
          case "$COMMAND" in
            wont-fix)
              gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
                --body "**AI Review**: F${FINDING_ID} recorded as *won't fix*${persisted_note}. Thank you for the feedback."
              ;;
            false-positive|dismiss)
              gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
                --body "**AI Review**: F${FINDING_ID} recorded as *false positive*${persisted_note}. Thank you for the feedback."
              ;;
            explain)
              gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
                --body "**AI Review**: explanation re-invocation for F${FINDING_ID} is not yet implemented. Please file an issue or open a discussion if you need more detail."
              ;;
            revise)
              gh pr comment "$ISSUE_NUMBER" --repo "$REPOSITORY" \
                --body "**AI Review**: revision for F${FINDING_ID} is not yet implemented. Please file an issue or open a discussion if you would like this feature."
              ;;
          esac

      - name: React — not applicable (no ID given)
        # valid == 'false' covers two cases: a genuine no-op (ID not found / no
        # ID given) and the inline-by-F-ID case, which is handled successfully by
        # the "Resolve inline finding by F-ID" step above. Only react 😕 for the
        # genuine no-op — i.e. when inline_fid was NOT set.
        if: steps.lookup.outputs.valid == 'false' && steps.lookup.outputs.inline_fid == ''
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=confused

  # ---------------------------------------------------------------------------
  # Dismiss a single false-positive finding.
  #
  # Triggered by replying to an inline review comment with
  # "/ai-pr-review dismiss". Resolves only the thread the user replied to.
  # If that was the last unresolved thread on the review, the
  # CHANGES_REQUESTED review is dismissed automatically.
  # ---------------------------------------------------------------------------
  dismiss-finding:
    if: |
      inputs.event-name == 'pull_request_review_comment' &&
      startsWith(inputs.comment-body, '/ai-pr-review dismiss') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), inputs.comment-author-association)
    runs-on: ubuntu-latest
    steps:
      - name: React — seen
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/pulls/comments/${COMMENT_ID}/reactions" \
            -f content=eyes

      - name: Validate parent comment is from the bot
        id: validate
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          IN_REPLY_TO_ID: ${{ inputs.in-reply-to-id }}
        run: |
          parent_id="${IN_REPLY_TO_ID}"
          if [[ -z "$parent_id" || "$parent_id" == "0" ]]; then
            echo "::error::This command must be used as a reply to an AI review finding."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          parent_json=$(gh api \
            "repos/${REPOSITORY}/pulls/comments/${parent_id}" \
            --jq '{login: .user.login, review_id: .pull_request_review_id}' 2>/dev/null) || {
            echo "::error::Could not fetch parent comment."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          }

          parent_author=$(echo "$parent_json" | jq -r '.login')
          review_id=$(echo "$parent_json" | jq -r '.review_id')

          if [[ "$parent_author" != "github-actions[bot]" ]]; then
            echo "::error::The parent comment is not from the AI reviewer (author: ${parent_author})."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "parent_id=${parent_id}" >> "$GITHUB_OUTPUT"
          echo "review_id=${review_id}" >> "$GITHUB_OUTPUT"
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Find and resolve the review thread
        if: steps.validate.outputs.valid == 'true'
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          OWNER: ${{ inputs.repository-owner }}
          REPO: ${{ inputs.repository-name }}
          PR_NUMBER: ${{ inputs.pr-number }}
          PARENT_COMMENT_ID: ${{ steps.validate.outputs.parent_id }}
        run: |
          cursor=""
          has_next=true
          thread_id=""

          while [[ "$has_next" == "true" && -z "$thread_id" ]]; do
            api_err=$(mktemp)
            result=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        isResolved
                        comments(first: 100) {
                          nodes { databaseId }
                        }
                      }
                    }
                  }
                }
              }' \
              -f owner="$OWNER" -f repo="$REPO" -F pr="$PR_NUMBER" \
              ${cursor:+-f after="$cursor"} 2>"$api_err") || {
              echo "::error::Could not fetch review threads: $(cat "$api_err")"
              rm -f "$api_err"
              exit 1
            }
            rm -f "$api_err"

            if echo "$result" | jq -e '.errors' >/dev/null 2>&1; then
              echo "::error::GraphQL returned errors: $(echo "$result" | jq -c '.errors')"
              exit 1
            fi

            thread_id=$(echo "$result" | jq -r \
              --argjson cid "$PARENT_COMMENT_ID" \
              '.data.repository.pullRequest.reviewThreads.nodes[]
               | select(.comments.nodes | map(.databaseId) | index($cid))
               | .id' | head -1)

            has_next=$(echo "$result" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            cursor=$(echo "$result" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // empty')
          done

          if [[ -z "$thread_id" ]]; then
            echo "::error::Could not locate the review thread for this comment."
            exit 1
          fi

          echo "thread_id=${thread_id}" >> "$GITHUB_OUTPUT"

          mut_err=$(mktemp)
          mut_result=$(gh api graphql -f query='
            mutation($threadId: ID!) {
              resolveReviewThread(input: {threadId: $threadId}) {
                thread { id isResolved }
              }
            }' \
            -f threadId="$thread_id" 2>"$mut_err") || {
            echo "::error::Failed to resolve review thread: $(cat "$mut_err")"
            rm -f "$mut_err"
            exit 1
          }
          rm -f "$mut_err"

          if echo "$mut_result" | jq -e '.errors' >/dev/null 2>&1; then
            echo "::error::GraphQL errors resolving thread: $(echo "$mut_result" | jq -c '.errors')"
            exit 1
          fi

          echo "Thread ${thread_id} resolved." >&2

      - name: Dismiss review if all threads resolved
        if: steps.validate.outputs.valid == 'true' && steps.resolve.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          OWNER: ${{ inputs.repository-owner }}
          REPO: ${{ inputs.repository-name }}
          PR_NUMBER: ${{ inputs.pr-number }}
          REVIEW_ID: ${{ steps.validate.outputs.review_id }}
          ACTOR: ${{ inputs.actor-login }}
        run: |
          review_state=$(gh api \
            "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}" \
            --jq '.state' 2>/dev/null) || {
            echo "Review ${REVIEW_ID} not found or not accessible; skipping dismissal." >&2
            exit 0
          }

          if [[ "$review_state" != "CHANGES_REQUESTED" ]]; then
            echo "Review state is ${review_state}, not CHANGES_REQUESTED; no dismissal needed." >&2
            exit 0
          fi

          all_threads="[]"
          cursor=""
          has_next=true

          while [[ "$has_next" == "true" ]]; do
            api_err=$(mktemp)
            page=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        isResolved
                        comments(first: 1) {
                          nodes { pullRequestReview { databaseId } }
                        }
                      }
                    }
                  }
                }
              }' \
              -f owner="$OWNER" -f repo="$REPO" -F pr="$PR_NUMBER" \
              ${cursor:+-f after="$cursor"} 2>"$api_err") || {
              echo "::error::Could not fetch threads for dismissal check: $(cat "$api_err")"
              rm -f "$api_err"
              exit 1
            }
            rm -f "$api_err"

            if echo "$page" | jq -e '.errors' >/dev/null 2>&1; then
              echo "::error::GraphQL returned errors while fetching threads: $(echo "$page" | jq -c '.errors')"
              exit 1
            fi

            page_nodes=$(echo "$page" | jq '.data.repository.pullRequest.reviewThreads.nodes')
            if [[ "$page_nodes" == "null" || -z "$page_nodes" ]]; then
              echo "::error::Malformed threads response (no nodes field)."
              exit 1
            fi
            all_threads=$(echo "$all_threads" "$page_nodes" | jq -s '.[0] + .[1]')
            has_next=$(echo "$page" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            cursor=$(echo "$page" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // empty')
          done

          unresolved=$(echo "$all_threads" | jq \
            --argjson rid "$REVIEW_ID" \
            '[.[] | select(
              .comments.nodes[0].pullRequestReview.databaseId == $rid and
              .isResolved == false
            )] | length')

          if [[ "$unresolved" -gt 0 ]]; then
            echo "${unresolved} unresolved thread(s) remain on review #${REVIEW_ID}; keeping CHANGES_REQUESTED." >&2
            exit 0
          fi

          if ! [[ "$ACTOR" =~ ^[a-zA-Z0-9][a-zA-Z0-9-]{0,38}(\[bot\])?$ ]]; then
            echo "::error::Refusing to dismiss: unexpected actor login '${ACTOR}'."
            exit 1
          fi
          dismiss_msg="All findings resolved as false positives — dismissed by @${ACTOR}."
          dismiss_err=$(mktemp)
          if gh api \
            "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}/dismissals" \
            --method PUT \
            --field "message=${dismiss_msg}" \
            >/dev/null 2>"$dismiss_err"; then
            echo "Dismissed review #${REVIEW_ID}." >&2
          else
            echo "::error::Failed to dismiss review #${REVIEW_ID}: $(cat "$dismiss_err")"
            rm -f "$dismiss_err"
            exit 1
          fi
          rm -f "$dismiss_err"

      - name: React — done
        if: steps.validate.outputs.valid == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/pulls/comments/${COMMENT_ID}/reactions" \
            -f content="+1"

      - name: React — not applicable
        if: steps.validate.outputs.valid == 'false'
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/pulls/comments/${COMMENT_ID}/reactions" \
            -f content=confused

      - name: React — failed
        if: steps.validate.outputs.valid == 'true' && failure()
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
        run: |
          gh api \
            "repos/${REPOSITORY}/pulls/comments/${COMMENT_ID}/reactions" \
            -f content=confused

  # ---------------------------------------------------------------------------
  # Capability C: learning-loop feedback commands.
  #
  # Handles: /ai-pr-review false-positive [reason]
  #          /ai-pr-review wont-fix [reason]
  #          /ai-pr-review feedback <text>
  #          /ai-pr-review explain
  #          /ai-pr-review revise <hint>
  #
  # Runs the Python CLI `ai-pr-review slash` subcommand, which parses the
  # comment body, writes a FeedbackEntry to the GitBranchStore, and prints
  # a reply.  The reply is posted back to the comment thread and the thread
  # is resolved if the command is a feedback command.
  #
  # Requires AI_FEEDBACK_LOOP=true and a GH_TOKEN with contents:write on the
  # feedback branch (default: ai-pr-review-bot).
  # ---------------------------------------------------------------------------
  feedback-command:
    # Feedback commands write to a long-lived branch that influences every
    # future review repo-wide.  Restrict to OWNER and MEMBER only — the same
    # trust level GitHub uses to gate "approve workflow runs from forks".
    # COLLABORATOR is intentionally excluded for persistent side-effects.
    #
    # Accepts both event types:
    #   - issue_comment (PR comments)
    #   - pull_request_review_comment (replies on inline review threads)
    # because the natural UX for `/ai-pr-review false-positive` is to reply
    # on the AI's finding comment.  See #290.
    if: |
      inputs.enable-feedback-loop == 'true' &&
      startsWith(inputs.comment-body, '/ai-pr-review') &&
      contains(fromJSON('["OWNER","MEMBER"]'), inputs.comment-author-association) &&
      (inputs.event-name == 'pull_request_review_comment' ||
       (inputs.event-name == 'issue_comment' && inputs.is-pull-request == 'true'))
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tag1consulting/ai-pr-review:${{ inputs.image-tag }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Resolve event-type endpoints
        id: endpoints
        # GitHub uses two different REST API paths for comment reactions
        # depending on event type. Compute once, use everywhere. Also expose
        # a flag for the review-thread-specific steps.  The job-level `if:`
        # already restricts to two values, but defense-in-depth: bail if
        # we get an unexpected one rather than silently falling through.
        env:
          EVENT_NAME: ${{ inputs.event-name }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            echo "reactions_path=pulls/comments"  >> "$GITHUB_OUTPUT"
            echo "is_review_comment=true"         >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            echo "reactions_path=issues/comments" >> "$GITHUB_OUTPUT"
            echo "is_review_comment=false"        >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unrecognized event-name '${EVENT_NAME}'; refusing to dispatch feedback command."
            exit 1
          fi

      - name: React — seen
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REACTIONS_PATH: ${{ steps.endpoints.outputs.reactions_path }}
        run: |
          gh api \
            "repos/${REPOSITORY}/${REACTIONS_PATH}/${COMMENT_ID}/reactions" \
            -f content=eyes

      - name: Extract finding context from parent comment
        # When the slash command is a reply on a review-thread comment, the
        # parent comment IS the AI finding. Fetch it, validate the author is
        # github-actions[bot], and parse source / file / rule_id from the
        # rendered body so the FeedbackEntry has proper context.
        #
        # All failure modes (missing in_reply_to_id, parent fetch error,
        # parent author isn't the bot, header parse failure) are best-effort:
        # the FeedbackEntry is still persisted (the reviewer's intent is
        # captured) but with empty context fields, AND a context_missing_reason
        # is exported.  The reply step prepends an explicit "(no finding
        # context auto-extracted)" note so the reviewer is not misled.
        if: steps.endpoints.outputs.is_review_comment == 'true'
        id: context
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          IN_REPLY_TO_ID: ${{ inputs.in-reply-to-id }}
        run: |
          export_missing() {
            local reason="$1"
            echo "::warning::${reason}"
            echo "context_missing_reason=${reason}" >> "$GITHUB_OUTPUT"
          }

          parent_id="${IN_REPLY_TO_ID}"
          if [[ -z "$parent_id" || "$parent_id" == "0" ]]; then
            export_missing "review-thread reply has no parent comment (in_reply_to_id is empty)"
            exit 0
          fi
          parent_json=$(gh api \
            "repos/${REPOSITORY}/pulls/comments/${parent_id}" \
            --jq '{login: .user.login, path: .path, body: .body}' 2>/dev/null) || {
            export_missing "could not fetch parent comment ${parent_id} from GitHub API"
            exit 0
          }
          parent_author=$(echo "$parent_json" | jq -r '.login')
          if [[ "$parent_author" != "github-actions[bot]" ]]; then
            export_missing "parent comment is not from the AI reviewer (author: ${parent_author})"
            exit 0
          fi
          parent_path=$(echo "$parent_json" | jq -r '.path // ""')
          parent_body=$(echo "$parent_json" | jq -r '.body // ""')
          # Inline-comment body header format (see ai_pr_review/vcs/github.py
          # _build_inline_comment_body):
          #   {icon} **[{severity}]** **[F{n}]** {source_tag} {finding text}
          #
          # The **[F{n}]** finding-ID token is present whenever a stable per-PR
          # ID was assigned (which is the default for all findings). Strip it
          # before extracting bracketed tokens so source lands at position 1
          # regardless of whether a finding ID is present. This mirrors the
          # body-level lookup step which already applies the same strip.
          #
          # After stripping, token positions are:
          #   token[1] = severity  (always present, e.g. [HIGH])
          #   token[2] = source    (e.g. [code-reviewer] or [sarif:bandit])
          #   token[3] = SARIF ruleId, only present when source starts with sarif:
          #
          # For multi-source findings (e.g. [code-reviewer, security-reviewer]),
          # keep only the first source tag to match the body-level convention.
          first_line=$(echo "$parent_body" | head -1 \
            | sed 's/\*\*\[F[0-9]\+\]\*\* *//')
          source=$(echo "$first_line" \
            | grep -oE '\[[^]]+\]' | sed -n '2p' | tr -d '[]' \
            | sed 's/,.*//' | tr -d ' ')
          rule_id=""
          if [[ "$source" == sarif:* ]]; then
            rule_id=$(echo "$first_line" \
              | grep -oE '\[[^]]+\]' | sed -n '3p' | tr -d '[]')
          fi
          if [[ -z "$source" ]]; then
            export_missing "could not parse source tag from parent comment header"
            # Still export path so file= is populated even on parse failure.
            echo "file=${parent_path}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "source=${source}"    >> "$GITHUB_OUTPUT"
          echo "file=${parent_path}" >> "$GITHUB_OUTPUT"
          echo "rule_id=${rule_id}"  >> "$GITHUB_OUTPUT"

      - name: Extract finding context from review body (issue_comment with F-ID)
        # When the slash command is a top-level PR comment (issue_comment event)
        # that includes a body-level finding ID — e.g.
        #   /ai-pr-review false-positive F3 this is a false alarm
        # — look up the finding in the review body so source/file/rule_id can
        # be populated in the FeedbackEntry.
        #
        # This mirrors the extraction in dismiss-body-finding's "Lookup body
        # finding" step.  Failure modes are best-effort: the entry is still
        # persisted with whatever context was found.
        if: steps.endpoints.outputs.is_review_comment == 'false'
        id: body_context
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          OWNER: ${{ inputs.repository-owner }}
          REPO: ${{ inputs.repository-name }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          COMMENT_BODY: ${{ inputs.comment-body }}
          PY_SCRIPT: |
            import json, os, re, sys

            fid = int(os.environ['FINDING_NUM'])
            bodies = json.load(sys.stdin)
            section_pat = re.compile(r'### Findings not attached to specific lines(.*?)(?=\n###|\Z)', re.DOTALL)
            id_map_pat = re.compile(r'<!-- ai-pr-review-id-map: ({.*?}) -->', re.DOTALL)
            f_token = f'**[F{fid}]**'

            for body in bodies:
                for section in section_pat.findall(body):
                    for line in section.splitlines():
                        if f_token in line:
                            stripped = re.sub(r'\*\*\[F[0-9]+\]\*\* *', '', line)
                            brackets = re.findall(r'\[([^\]]+)\]', stripped)
                            source = brackets[0].split(',')[0].strip() if brackets else ''
                            m = re.search(r'\(at `([^`]+)`', line) or re.search(r'— `([^`]+)', line)
                            file_line = m.group(1) if m else ''
                            file_part = file_line.rsplit(':', 1)[0] if ':' in file_line else file_line
                            rule_id = ''
                            if source.startswith('sarif:') and len(brackets) > 1:
                                rule_id = brackets[1]
                            print(f'body|{source}|{file_part}|{rule_id}')
                            sys.exit(0)

            for body in bodies:
                m = id_map_pat.search(body)
                if not m:
                    continue
                try:
                    d = json.loads(m.group(1))
                    if any(int(v) == fid for v in d.values()):
                        print('inline')
                        sys.exit(0)
                except Exception:
                    pass

            print('not_found')
        run: |
          # Extract the finding ID from the comment body (e.g. "F3" → "3").
          # The parser accepts F<n> as the second token after the command.
          second_token=$(echo "$COMMENT_BODY" | head -1 | tr -d '\r' | awk '{print $3}')
          if ! echo "$second_token" | grep -qiE '^F[0-9]{1,6}$'; then
            # No F-ID in this comment — nothing to look up.
            exit 0
          fi
          finding_num=$(echo "$second_token" | grep -oE '[0-9]{1,6}')

          # Allocate all temp files upfront and set a single EXIT trap so any
          # early exit (including mktemp failures below) cleans up correctly.
          api_err=$(mktemp) || { echo "::error::mktemp failed (api_err)"; exit 1; }
          py_script=$(mktemp --suffix=.py) || { echo "::error::mktemp failed (py_script)"; rm -f "$api_err"; exit 1; }
          py_err=$(mktemp) || { echo "::error::mktemp failed (py_err)"; rm -f "$api_err" "$py_script"; exit 1; }
          trap 'rm -f "$api_err" "$py_script" "$py_err"' EXIT

          api_failed=false
          all_bodies=$(gh api \
            "repos/${OWNER}/${REPO}/pulls/${ISSUE_NUMBER}/reviews?per_page=100" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | .body // ""]' \
            2>"$api_err") || {
            echo "::warning::gh api failed fetching reviews for F${finding_num} context lookup: $(cat "$api_err")" >&2
            api_failed=true
          }
          if [[ -s "$api_err" ]]; then
            echo "::warning::gh api stderr: $(cat "$api_err")" >&2
          fi
          # Skip the lookup entirely if the API call failed — an empty body list
          # would silently produce 'not_found', indistinguishable from a genuine miss.
          if [[ "$api_failed" == "true" ]]; then
            exit 0
          fi

          # Use Python (available in the feedback-command container) to search
          # review bodies robustly. Bash line-by-line reads split multi-line
          # bodies across iterations, making section boundary detection unreliable.
          # Write the script to a temp file; pipe bodies via stdin to avoid quoting issues.
          # Use '|' as the field separator — safe because source tags and file paths
          # never contain '|', unlike ':' which appears in file:line annotations.
          # PY_SCRIPT is defined in this step's env block as a YAML literal block scalar
          # to avoid embedding unindented Python inside the YAML document body.
          printf '%s' "$PY_SCRIPT" > "$py_script"
          result=$(printf '%s' "$all_bodies" | FINDING_NUM="$finding_num" python3 "$py_script" 2>"$py_err") || {
            echo "::warning::Python context-lookup script failed for F${finding_num}: $(cat "$py_err"); feedback entry will lack source/file context" >&2
            exit 0
          }
          if [[ -s "$py_err" ]]; then
            echo "::warning::Python context-lookup stderr for F${finding_num}: $(cat "$py_err")" >&2
          fi

          case "$result" in
            body\|*)
              IFS='|' read -r _ source finding_file rule_id <<< "$result"
              echo "source=${source}"       >> "$GITHUB_OUTPUT"
              echo "file=${finding_file}"   >> "$GITHUB_OUTPUT"
              echo "rule_id=${rule_id}"     >> "$GITHUB_OUTPUT"
              ;;
            inline)
              echo "::notice::F${finding_num} is an inline finding; for full context in the feedback entry, reply directly to the finding thread instead of using a top-level comment"
              ;;
            not_found)
              ;;
          esac

      - name: Invoke Python slash handler
        id: handler
        env:
          SLASH_COMMENT_BODY: ${{ inputs.comment-body }}
          # Prefer wrapper-supplied context (legacy), then context auto-extracted
          # from the parent inline comment (review_comment path), then context
          # looked up from the review body (issue_comment + F-ID path).
          SLASH_SOURCE: ${{ inputs.finding-source || steps.context.outputs.source || steps.body_context.outputs.source }}
          SLASH_FILE: ${{ inputs.finding-file || steps.context.outputs.file || steps.body_context.outputs.file }}
          SLASH_RULE_ID: ${{ inputs.finding-rule-id || steps.context.outputs.rule_id || steps.body_context.outputs.rule_id }}
          # Forward extraction failure reason so the Python handler can flag
          # context_missing in extras without re-diagnosing the cause.
          SLASH_CONTEXT_MISSING_REASON: ${{ steps.context.outputs.context_missing_reason }}
          AI_FEEDBACK_LOOP: 'true'
          GITHUB_REPOSITORY: ${{ inputs.repository }}
          GH_TOKEN: ${{ secrets.github-token }}
          AI_PROVIDER: ${{ inputs.provider }}
          VCS_PROVIDER: 'github'
        run: |
          set +e
          reply=$(ai-pr-review slash 2>/tmp/slash-stderr)
          exit_code=$?
          stderr_content=$(cat /tmp/slash-stderr)
          if [[ -n "$stderr_content" ]]; then
            echo "$stderr_content" >&2
          fi
          if [[ $exit_code -eq 2 ]]; then
            echo "::notice::Not a recognized slash command; skipping."
            echo "is_command=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ $exit_code -ne 0 ]]; then
            echo "::error::slash handler exited $exit_code"
            echo "is_command=false" >> "$GITHUB_OUTPUT"
            exit $exit_code
          fi
          if [[ -z "$reply" ]]; then
            echo "is_command=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Encode reply so it survives multiline GITHUB_OUTPUT
          encoded=$(printf '%s' "$reply" | base64 -w0)
          echo "reply_b64=${encoded}" >> "$GITHUB_OUTPUT"
          echo "is_command=true" >> "$GITHUB_OUTPUT"

      - name: Post reply (review-thread)
        # Reply in-thread when triggered from a review-thread comment, so the
        # confirmation lands next to the AI finding the reviewer was acting on.
        if: |
          steps.handler.outputs.is_command == 'true' &&
          steps.endpoints.outputs.is_review_comment == 'true'
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REPLY_B64: ${{ steps.handler.outputs.reply_b64 }}
          CONTEXT_MISSING_REASON: ${{ steps.context.outputs.context_missing_reason }}
        run: |
          set -e
          reply_file=$(mktemp)
          # Trap covers both the base file and the transient .with-note copy
          # so we don't leak a temp file if the prepend pipeline below fails.
          trap 'rm -f "$reply_file" "${reply_file}.with-note"' EXIT
          # If base64 decode fails the file is empty; fail loudly instead of
          # silently POSTing a blank reply.
          if ! echo "$REPLY_B64" | base64 -d > "$reply_file"; then
            echo "::error::Failed to decode reply body from the slash handler."
            exit 1
          fi
          if [[ ! -s "$reply_file" ]]; then
            echo "::error::Decoded reply body is empty; refusing to post a blank reply."
            exit 1
          fi
          # Prepend a transparency note if context auto-extraction missed
          # something, so the reviewer knows their FeedbackEntry was persisted
          # without source/file/rule_id and isn't misled by the success reaction.
          if [[ -n "$CONTEXT_MISSING_REASON" ]]; then
            { printf '> ⚠️ **Note:** finding context was not auto-extracted (%s). The feedback was still persisted, but the entry will lack source/file/rule_id.\n\n' "$CONTEXT_MISSING_REASON"; cat "$reply_file"; } > "${reply_file}.with-note"
            mv "${reply_file}.with-note" "$reply_file"
          fi
          # gh has no built-in subcommand for review-comment replies; use the
          # REST API directly with --field "body=@file" so the body bypasses argv.
          gh api \
            --method POST \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments/${COMMENT_ID}/replies" \
            --field "body=@${reply_file}" \
            >/dev/null

      - name: Post reply (top-level)
        # When triggered from an issue_comment (top-level PR comment),
        # post the reply as a sibling top-level comment.
        if: |
          steps.handler.outputs.is_command == 'true' &&
          steps.endpoints.outputs.is_review_comment == 'false'
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          REPLY_B64: ${{ steps.handler.outputs.reply_b64 }}
        run: |
          # Write reply to a temp file and use --body-file so the body content
          # never becomes part of the gh command line. Defense-in-depth: the
          # Python handler already HTML-escapes user content, but body-file
          # ensures no part of the reply is parsed by the shell.
          set -e
          reply_file=$(mktemp)
          trap 'rm -f "$reply_file"' EXIT
          if ! echo "$REPLY_B64" | base64 -d > "$reply_file"; then
            echo "::error::Failed to decode reply body from the slash handler."
            exit 1
          fi
          if [[ ! -s "$reply_file" ]]; then
            echo "::error::Decoded reply body is empty; refusing to post a blank comment."
            exit 1
          fi
          gh pr comment "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --body-file "$reply_file"

      - name: Resolve review thread on success
        # For false-positive / wont-fix from a review-thread reply, also
        # resolve the thread — same UX as /ai-pr-review dismiss.  Skip for
        # 'feedback' (free-form, not tied to a single finding) and 'explain'/
        # 'revise' (informational, finding stays active).  Identified via
        # the comment body prefix to keep the workflow free of Python deps.
        if: |
          steps.handler.outputs.is_command == 'true' &&
          steps.endpoints.outputs.is_review_comment == 'true' &&
          (startsWith(inputs.comment-body, '/ai-pr-review false-positive') ||
           startsWith(inputs.comment-body, '/ai-pr-review wont-fix'))
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          OWNER: ${{ inputs.repository-owner }}
          REPO: ${{ inputs.repository-name }}
          PR_NUMBER: ${{ inputs.pr-number }}
          PARENT_COMMENT_ID: ${{ inputs.in-reply-to-id }}
        run: |
          # Find the review thread containing the parent comment (the AI
          # finding) and resolve it.  Lifted from dismiss-finding above.
          cursor=""
          has_next=true
          thread_id=""
          while [[ "$has_next" == "true" && -z "$thread_id" ]]; do
            result=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $after) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        comments(first: 100) { nodes { databaseId } }
                      }
                    }
                  }
                }
              }' \
              -f owner="$OWNER" -f repo="$REPO" -F pr="$PR_NUMBER" \
              ${cursor:+-f after="$cursor"}) || {
              echo "::warning::Could not fetch review threads to resolve (transport error); feedback persisted but thread left open."
              exit 0
            }
            # GraphQL returns HTTP 200 even on schema/permission errors; the
            # errors land in .errors[]. Treat them as fatal-for-this-step but
            # still best-effort overall (feedback already persisted).
            # Use `length // 0 > 0` so we correctly skip on missing-key,
            # .errors:null, and empty array — not just on a present .errors.
            if echo "$result" | jq -e '(.errors | length // 0) > 0' >/dev/null 2>&1; then
              echo "::warning::GraphQL error fetching review threads: $(echo "$result" | jq -c '.errors'); feedback persisted but thread left open."
              exit 0
            fi
            thread_id=$(echo "$result" | jq -r \
              --argjson cid "$PARENT_COMMENT_ID" \
              '.data.repository.pullRequest.reviewThreads.nodes[]
               | select(.comments.nodes | map(.databaseId) | index($cid))
               | .id' | head -1)
            has_next=$(echo "$result" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            cursor=$(echo "$result" | jq -r \
              '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // empty')
          done
          if [[ -z "$thread_id" ]]; then
            echo "::warning::Could not locate review thread for parent comment ${PARENT_COMMENT_ID}; feedback persisted but thread left open."
            exit 0
          fi
          mut_result=$(gh api graphql -f query='
            mutation($threadId: ID!) {
              resolveReviewThread(input: {threadId: $threadId}) {
                thread { id isResolved }
              }
            }' \
            -f threadId="$thread_id" 2>&1) || {
              echo "::warning::Failed to resolve review thread ${thread_id} (transport error): ${mut_result}; feedback persisted."
              exit 0
            }
          if echo "$mut_result" | jq -e '(.errors | length // 0) > 0' >/dev/null 2>&1; then
            echo "::warning::GraphQL error resolving review thread ${thread_id}: $(echo "$mut_result" | jq -c '.errors'); feedback persisted."
            exit 0
          fi
          echo "Thread ${thread_id} resolved." >&2

      - name: React — done
        if: steps.handler.outputs.is_command == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REACTIONS_PATH: ${{ steps.endpoints.outputs.reactions_path }}
        run: |
          gh api \
            "repos/${REPOSITORY}/${REACTIONS_PATH}/${COMMENT_ID}/reactions" \
            -f content="+1"

      - name: React — failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.actions-token }}
          REPOSITORY: ${{ inputs.repository }}
          COMMENT_ID: ${{ inputs.comment-id }}
          REACTIONS_PATH: ${{ steps.endpoints.outputs.reactions_path }}
        run: |
          gh api \
            "repos/${REPOSITORY}/${REACTIONS_PATH}/${COMMENT_ID}/reactions" \
            -f content=confused
