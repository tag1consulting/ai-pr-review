name: Publish container image

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Build only, do not push'
        required: false
        default: 'false'

permissions:
  contents: read
  packages: write
  id-token: write  # for cosign keyless signing

jobs:
  build-push:
    concurrency:
      group: publish-image-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Extract version metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/tag1consulting/ai-pr-review
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') && startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        if: ${{ github.event.inputs.dry-run != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event.inputs.dry-run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: ${{ github.event.inputs.dry-run != 'true' && startsWith(github.ref, 'refs/tags/') }}
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image
        if: ${{ github.event.inputs.dry-run != 'true' && startsWith(github.ref, 'refs/tags/') }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/tag1consulting/ai-pr-review@${DIGEST}"
