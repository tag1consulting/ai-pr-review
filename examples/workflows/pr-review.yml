# AI PR Review — automatic PR trigger (container-action variant)
#
# Copy this file to .github/workflows/ai-pr-review.yml in your repo.
#
# This variant pulls a pinned container image from GHCR, which provides
# version-pinned analyzer binaries (shellcheck, semgrep, trufflehog, ruff,
# golangci-lint). If you prefer to run on the Actions runner without Docker,
# use the root action instead: tag1consulting/ai-pr-review@main
#
# Requirements:
#   - ANTHROPIC_API_KEY secret (or substitute your provider's key)
#
# Pair with examples/workflows/comment-triggers.yml to enable slash commands.
# Note: for rescan/review-full on labeled events, use slash commands instead of
# pull_request_target — the labeled trigger on pull_request_target exposes secrets
# to fork PRs and is intentionally omitted here.

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    # Skip draft PRs; skip if 'skip-ai-review' label is present
    if: |
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI review
        uses: tag1consulting/ai-pr-review/container-action@main
        env:
          FORCE_FULL_DIFF: ${{ contains(github.event.pull_request.labels.*.name, 'ai-review-rescan') }}
        with:
          # AI_REVIEW_IMAGE_TAG: container image tag (default: latest)
          # Set to 'dev' to dogfood pre-release builds, or pin to a release
          # tag (e.g. '0.8.0') for reproducibility.
          image-tag: ${{ vars.AI_REVIEW_IMAGE_TAG || 'latest' }}
          # --- Provider ---
          # Set AI_REVIEW_API_KEY as a repository secret.
          api-key: ${{ secrets.AI_REVIEW_API_KEY }}
          github-token: ${{ github.token }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          # --- Optional repo variables (set in Settings → Variables) ---
          # AI_REVIEW_PROVIDER: LLM provider (default: anthropic)
          provider: ${{ vars.AI_REVIEW_PROVIDER || 'anthropic' }}
          # AI_REVIEW_BASE_URL: custom endpoint for openai-compatible or bedrock-proxy
          base-url: ${{ vars.AI_REVIEW_BASE_URL || '' }}
          # AI_REVIEW_MODEL_STANDARD / AI_REVIEW_MODEL_PREMIUM: override provider defaults
          model-standard: ${{ vars.AI_REVIEW_MODEL_STANDARD || '' }}
          model-premium: ${{ vars.AI_REVIEW_MODEL_PREMIUM || '' }}
          # Auto-select full mode for release PRs; customize the branch pattern
          # for your repo's convention. See README "Auto-detecting release PRs".
          review-mode: >-
            ${{
              contains(github.event.pull_request.labels.*.name, 'ai-review-full') && 'full' ||
              startsWith(github.event.pull_request.head.ref, 'release/') && 'full' ||
              'quick'
            }}
          # AI_REVIEW_MAX_DIFF_LINES: skip review when diff exceeds this many lines (default: 5000)
          max-diff-lines: ${{ vars.AI_REVIEW_MAX_DIFF_LINES || '5000' }}
          # AI_REVIEW_MAX_INLINE: max inline comments per run; excess goes to summary (default: 25)
          max-inline: ${{ vars.AI_REVIEW_MAX_INLINE || '25' }}
          # AI_REVIEW_MAX_TOKENS_PER_AGENT: output token budget per LLM agent (default: 8192)
          max-tokens-per-agent: ${{ vars.AI_REVIEW_MAX_TOKENS_PER_AGENT || '8192' }}
          # AI_REVIEW_ENABLE_SUGGESTIONS: "Apply suggestion" buttons on inline comments (default: true)
          enable-suggestions: ${{ vars.AI_REVIEW_ENABLE_SUGGESTIONS || 'true' }}
          # AI_REVIEW_PARALLEL: parallel tiered fan-out; set false to go sequential (default: true)
          parallel: ${{ vars.AI_REVIEW_PARALLEL || 'true' }}
          # AI_PR_REVIEW_ENGINE: compute engine, bash or python (default: bash)
          engine: ${{ vars.AI_PR_REVIEW_ENGINE || 'bash' }}
          # AI_REVIEW_IGNORE_MERGE_COMMITS: strip upstream base-branch merges from diff (default: false)
          ignore-merge-commits: ${{ vars.AI_REVIEW_IGNORE_MERGE_COMMITS || 'false' }}
          # --- Epic 3: opt-in capabilities (Python engine only — set AI_PR_REVIEW_ENGINE=python) ---
          # AI_REVIEW_CONTEXT_ENRICHMENT: tree-sitter + ripgrep symbol-context injection (default: false)
          context-enrichment: ${{ vars.AI_REVIEW_CONTEXT_ENRICHMENT || 'false' }}
          # AI_REVIEW_SARIF_PATHS: comma-separated SARIF 2.1.0 file paths to merge as findings (default: '')
          # Example: 'results/codeql.sarif,results/trivy.sarif' — see examples/workflows/sarif-codeql.yml
          sarif-paths: ${{ vars.AI_REVIEW_SARIF_PATHS || '' }}
          # AI_REVIEW_FEEDBACK_LOOP: load past /ai-pr-review false-positive | wont-fix | feedback entries
          # from the ai-pr-review-bot branch and inject them into agent prompts (default: false).
          # Requires github-token with contents:write on that branch.
          feedback-loop: ${{ vars.AI_REVIEW_FEEDBACK_LOOP || 'false' }}
          # Use /ai-pr-review rescan in a PR comment to trigger a full-diff re-review
