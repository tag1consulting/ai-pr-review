# AI PR Review — automatic PR trigger (container-action variant)
#
# Copy this file to .github/workflows/ai-pr-review.yml in your repo.
#
# This variant pulls a pinned container image from GHCR, which provides
# version-pinned analyzer binaries (shellcheck, semgrep, trufflehog, ruff,
# golangci-lint). If you prefer to run on the Actions runner without Docker,
# use the root action instead: tag1consulting/ai-pr-review@main
#
# Requirements:
#   - ANTHROPIC_API_KEY secret (or substitute your provider's key)
#
# Pair with examples/workflows/comment-triggers.yml to enable slash commands.
# Note: for rescan/review-full on labeled events, use slash commands instead of
# pull_request_target — the labeled trigger on pull_request_target exposes secrets
# to fork PRs and is intentionally omitted here.

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    # Skip draft PRs; skip if 'skip-ai-review' label is present
    if: |
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI review
        uses: tag1consulting/ai-pr-review/container-action@main
        with:
          image-tag: 'latest'
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ github.token }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          # Auto-select full mode for release PRs; customize the branch pattern
          # for your repo's convention. See README "Auto-detecting release PRs".
          review-mode: >-
            ${{
              contains(github.event.pull_request.labels.*.name, 'ai-review-full') && 'full' ||
              startsWith(github.event.pull_request.head.ref, 'release/') && 'full' ||
              'quick'
            }}
          # Use /ai-pr-review rescan in a PR comment to trigger a full-diff re-review
