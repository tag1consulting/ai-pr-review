# AI PR Review — standalone slash command trigger
#
# ── You probably do not need this file ───────────────────────────────────────
#
# Since v1.7.0, examples/workflows/pr-review.yml is a unified single-file setup
# that handles BOTH automatic PR reviews AND slash commands in one workflow.
# New repositories should copy pr-review.yml instead of this file.
#
# This file is kept for existing consumers who already have a two-file setup
# (ai-pr-review.yml + ai-pr-review-commands.yml).  It continues to work
# unchanged — the reusable workflow it calls has not changed.  No migration is
# required.  If you prefer a single file, copy pr-review.yml over your existing
# ai-pr-review.yml and delete ai-pr-review-commands.yml.
#
# ── What this file does ───────────────────────────────────────────────────────
#
# Copy this file to .github/workflows/ai-pr-review-commands.yml in your repo.
#
# This thin wrapper forwards PR comment events to the reusable workflow in
# tag1consulting/ai-pr-review, which handles command parsing, review dispatch,
# and the dismiss/thread-resolution logic. You only need to maintain the
# secrets and optional provider configuration below.
#
# Supported commands (post as a PR comment):
#   /ai-pr-review rescan                  — force full diff, re-run review
#   /ai-pr-review review-full             — run in full mode (all agents)
#   /ai-pr-review skip                    — add skip-ai-review label to suppress next review
#   /ai-pr-review dismiss                 — reply to an INLINE finding to dismiss it
#   /ai-pr-review dismiss F<n>            — dismiss a BODY-LEVEL finding by its stable ID
#                                           (e.g. /ai-pr-review dismiss F1)
#   /ai-pr-review help                    — post the command list as a reply
#
# Body-level findings (in "### Findings not attached to specific lines") carry stable
# per-PR IDs (**[F1]**, **[F2]**, etc.) that persist across review cycles. Use F<n>
# variants of any command to target them from a top-level PR comment.
#
# Learning-loop commands (require enable-feedback-loop: 'true' below, plus
# a GH_TOKEN with contents:write on the ai-pr-review-bot branch; OWNER/MEMBER only):
#   /ai-pr-review false-positive [F<n>] [reason] — persist a false-positive verdict
#   /ai-pr-review wont-fix [F<n>] [reason]       — persist a "won't fix" verdict
#   /ai-pr-review feedback <text>                — persist free-form feedback
#   /ai-pr-review explain [F<n>]                 — request an expanded explanation (stub)
#   /ai-pr-review revise [F<n>] <hint>           — request a revised verdict (stub)
#
# Requirements:
#   - ANTHROPIC_API_KEY secret (or your provider's key)
#   - GH_TOKEN secret: a PAT with repo scope (classic) or pull_requests:write +
#     metadata:read (fine-grained). GITHUB_TOKEN cannot resolve review threads
#     from pull_request_review_comment events — the dismiss command requires a PAT.
#   - Only users with write access to this repo can trigger commands
#
# Optional repo variables (Settings -> Variables -> New repository variable):
#   AI_REVIEW_ANALYZERS          — allowlist of analyzers to run (comma-separated)
#   AI_REVIEW_EXCLUDE_ANALYZERS  — denylist of analyzers to skip (e.g. 'phpstan,phpcs')
#   AI_REVIEW_AGENTS             — allowlist of review agents to run (comma-separated)
#   AI_REVIEW_EXCLUDE_AGENTS     — denylist of review agents to skip
#   Setting these here ensures rescan and review-full honor the same filtering as the
#   main PR-triggered review. Leave unset to run all eligible analyzers and agents.
#
# IMPORTANT: issue_comment and pull_request_review_comment workflows run from
# the default branch only. Changes to this file take effect only after they are
# merged to the default branch.

name: AI PR Review — slash commands

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  slash-commands:
    # Gate: only fire on /ai-pr-review comments from authorized users on PRs
    if: >-
      startsWith(github.event.comment.body, '/ai-pr-review') &&
      contains(
        fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
        github.event.comment.author_association
      ) &&
      (github.event_name == 'pull_request_review_comment' ||
       (github.event_name == 'issue_comment' && github.event.issue.pull_request))
    uses: tag1consulting/ai-pr-review/.github/workflows/slash-commands.yml@main
    with:
      event-name: ${{ github.event_name }}
      comment-body: ${{ github.event.comment.body }}
      comment-id: ${{ github.event.comment.id }}
      comment-author-association: ${{ github.event.comment.author_association }}
      issue-number: ${{ github.event.issue.number || '' }}
      pr-number: ${{ github.event.pull_request.number || '' }}
      in-reply-to-id: ${{ github.event.comment.in_reply_to_id || '' }}
      is-pull-request: ${{ github.event.issue.pull_request && 'true' || 'false' }}
      repository: ${{ github.repository }}
      repository-owner: ${{ github.repository_owner }}
      repository-name: ${{ github.event.repository.name }}
      actor-login: ${{ github.event.comment.user.login }}
      # --- Optional repo variables (set in Settings → Variables) ---
      # All of these fall back to safe defaults when the corresponding
      # repo variable is unset, so this wrapper works out of the box.
      provider: ${{ vars.AI_REVIEW_PROVIDER || 'anthropic' }}
      base-url: ${{ vars.AI_REVIEW_BASE_URL || '' }}
      image-tag: ${{ vars.AI_REVIEW_IMAGE_TAG || 'latest' }}
      review-mode-default: ${{ vars.AI_REVIEW_MODE_DEFAULT || 'quick' }}
      # --- Learning loop (Capability C) ---
      # AI_REVIEW_FEEDBACK_LOOP gates the feedback-command job which handles
      # /ai-pr-review false-positive | wont-fix | feedback | explain | revise.
      # Persistent feedback commands require GH_TOKEN with contents:write on
      # the ai-pr-review-bot branch. OWNER/MEMBER only (enforced upstream).
      enable-feedback-loop: ${{ vars.AI_REVIEW_FEEDBACK_LOOP || 'false' }}
      # --- Analyzer / agent filtering (Python engine) ---
      # These are forwarded to rescan and review-full to keep them in sync with
      # the main review. Set the repo variables in Settings -> Variables.
      # Leave unset (empty) to run all eligible analyzers and agents.
      analyzers: ${{ vars.AI_REVIEW_ANALYZERS || '' }}
      exclude-analyzers: ${{ vars.AI_REVIEW_EXCLUDE_ANALYZERS || '' }}
      agents: ${{ vars.AI_REVIEW_AGENTS || '' }}
      exclude-agents: ${{ vars.AI_REVIEW_EXCLUDE_AGENTS || '' }}
    secrets:
      api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      # GH_TOKEN must be a PAT (repo scope) or GitHub App token — not GITHUB_TOKEN.
      # Required only for the dismiss command's resolveReviewThread mutation.
      # See: docs/slash-commands.md#pat-requirement
      github-token: ${{ secrets.GH_TOKEN }}
      # Built-in GITHUB_TOKEN: used for plain comment posts, reactions, reads,
      # and label changes so those operations post as github-actions[bot]. Optional
      # (the callee falls back to its own github.token if omitted) but recommended,
      # since the fallback still works but is a weaker guarantee of bot identity.
      actions-token: ${{ secrets.GITHUB_TOKEN }}
