# AI PR Review — slash command trigger
#
# Copy this file to .github/workflows/ai-pr-review-commands.yml in your repo.
#
# This thin wrapper forwards PR comment events to the reusable workflow in
# tag1consulting/ai-pr-review, which handles command parsing, review dispatch,
# and the dismiss/thread-resolution logic. You only need to maintain the
# secrets and optional provider configuration below.
#
# Supported commands (post as a PR comment):
#   /ai-pr-review rescan       — force full diff, re-run review
#   /ai-pr-review review-full  — run in full mode (all agents)
#   /ai-pr-review skip         — add skip-ai-review label to suppress the next review
#   /ai-pr-review dismiss      — reply to an inline finding to mark it as a false positive
#   /ai-pr-review help         — post the command list as a reply
#
# Requirements:
#   - ANTHROPIC_API_KEY secret (or your provider's key)
#   - GH_TOKEN secret: a PAT with repo scope (classic) or pull_requests:write +
#     metadata:read (fine-grained). GITHUB_TOKEN cannot resolve review threads
#     from pull_request_review_comment events — the dismiss command requires a PAT.
#   - Only users with write access to this repo can trigger commands
#
# IMPORTANT: issue_comment and pull_request_review_comment workflows run from
# the default branch only. Changes to this file take effect only after they are
# merged to the default branch.

name: AI PR Review — slash commands

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  slash-commands:
    # Gate: only fire on /ai-pr-review comments from authorized users on PRs
    if: >-
      startsWith(github.event.comment.body, '/ai-pr-review') &&
      contains(
        fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
        github.event.comment.author_association
      ) &&
      (github.event_name == 'pull_request_review_comment' ||
       (github.event_name == 'issue_comment' && github.event.issue.pull_request))
    uses: tag1consulting/ai-pr-review/.github/workflows/slash-commands.yml@main
    with:
      event-name: ${{ github.event_name }}
      comment-body: ${{ github.event.comment.body }}
      comment-id: ${{ github.event.comment.id }}
      comment-author-association: ${{ github.event.comment.author_association }}
      issue-number: ${{ github.event.issue.number || '' }}
      pr-number: ${{ github.event.pull_request.number || '' }}
      in-reply-to-id: ${{ github.event.comment.in_reply_to_id || '' }}
      is-pull-request: ${{ github.event.issue.pull_request && 'true' || 'false' }}
      repository: ${{ github.repository }}
      repository-owner: ${{ github.repository_owner }}
      repository-name: ${{ github.event.repository.name }}
      actor-login: ${{ github.event.comment.user.login }}
      # --- CUSTOMIZE: uncomment and modify these for your setup ---
      # provider: 'anthropic'
      # base-url: ''
      # image-tag: 'latest'
      # review-mode-default: 'quick'
    secrets:
      api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      # GH_TOKEN must be a PAT (repo scope) or GitHub App token — not GITHUB_TOKEN.
      # GITHUB_TOKEN from pull_request_review_comment events cannot call the
      # resolveReviewThread GraphQL mutation used by /ai-pr-review dismiss.
      # See: docs/slash-commands.md#pat-requirement
      github-token: ${{ secrets.GH_TOKEN }}
