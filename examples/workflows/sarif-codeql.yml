# Example: CodeQL SARIF + AI PR Review
#
# Runs CodeQL analysis then passes the SARIF output to the AI reviewer
# so findings from both are merged into a single review comment.
#
# Requirements:
#   - AI_PR_REVIEW_ENGINE=python (set via engine: python below)
#   - ANTHROPIC_API_KEY or equivalent secret
#   - Standard GitHub Actions permissions for CodeQL + PR review posting

name: Code Review (CodeQL + AI)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write  # Required for CodeQL upload

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Initialize CodeQL (adjust language as needed)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      # Build step (for compiled languages; skip for interpreted)
      # - name: Build
      #   run: make build

      # Run CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: results/codeql.sarif
          upload: false  # We'll pass the SARIF to AI reviewer instead

      # Run AI PR Review, ingesting the CodeQL SARIF output
      - name: AI PR Review
        uses: tag1consulting/ai-pr-review@main
        with:
          engine: python
          sarif-paths: 'results/codeql.sarif'
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          head-sha: ${{ github.event.pull_request.head.sha }}
