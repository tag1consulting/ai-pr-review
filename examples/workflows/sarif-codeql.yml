# Example: CodeQL SARIF + AI PR Review
#
# Runs CodeQL analysis then passes the SARIF output to the AI reviewer
# so findings from both are merged into a single review comment.
#
# Requirements:
#   - Python engine (`engine: python`) — SARIF ingestion is implemented in
#     the Python pipeline only.  Because the Python engine ships in the
#     container image, this workflow uses `container-action` rather than
#     the root composite action (which would need pip + Python deps on the
#     Actions runner).
#   - ANTHROPIC_API_KEY or equivalent secret
#   - Standard GitHub Actions permissions for CodeQL + PR review posting

name: Code Review (CodeQL + AI)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write  # Required for CodeQL upload

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Initialize CodeQL (adjust language as needed)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      # Build step (for compiled languages; skip for interpreted)
      # - name: Build
      #   run: make build

      # Run CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: results/codeql.sarif
          upload: false  # We'll pass the SARIF to AI reviewer instead

      # Run AI PR Review, ingesting the CodeQL SARIF output.
      # Uses container-action because SARIF ingestion requires the Python
      # engine, which ships in the container image.
      - name: AI PR Review
        uses: tag1consulting/ai-pr-review/container-action@main
        with:
          # vars.AI_REVIEW_IMAGE_TAG pins the container image. Default
          # 'latest'; set to 'dev' to dogfood pre-release builds.
          image-tag: ${{ vars.AI_REVIEW_IMAGE_TAG || 'latest' }}
          engine: 'python'
          # Comma-separated paths to SARIF 2.1.0 files. Findings merge
          # into the same dedup/suppress pipeline as native analyzers.
          sarif-paths: 'results/codeql.sarif'
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          head-sha: ${{ github.event.pull_request.head.sha }}
