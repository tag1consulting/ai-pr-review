# Bitbucket Pipelines starter for ai-pr-review.
#
# Copy this file to `bitbucket-pipelines.yml` at the root of your Bitbucket
# Cloud repository and enable Pipelines in repository settings.
#
# Required repository variables (Repository settings -> Pipelines -> Repository variables):
#   ANTHROPIC_API_KEY   (secured)  — or OPENAI_API_KEY / GOOGLE_API_KEY etc.
#                                    depending on AI_PROVIDER.
#   BITBUCKET_EMAIL     (plain)    — Atlassian account email for the bot user.
#   BITBUCKET_API_TOKEN (secured)  — Atlassian API token with
#                                    Repository:Read + PR:Write scopes.
#   AI_REVIEW_IMAGE_TAG (plain)    — Container tag to pull. Recommended:
#                                    'latest' (stable), 'dev' (pre-release),
#                                    or a pinned release like '0.11.0'
#                                    (image tags strip the 'v' prefix).
#                                    Bitbucket Pipelines does not support
#                                    bash-style defaults in image.name, so
#                                    this must be set explicitly.
#
# Optional repository variables:
#   AI_PROVIDER             (plain, default: anthropic)
#   AI_REVIEW_MODE          (plain, default: quick; set to 'full' for deep agents)
#   AI_IGNORE_MERGE_COMMITS (plain, default: true; strip base-branch merges
#                            from the diff before review; set to false to include upstream merges)
#
# Opt-in capabilities (require the Python engine, which is the default):
#   AI_CONTEXT_ENRICHMENT  (plain, default: false; tree-sitter symbol context)
#   AI_SARIF_PATHS         (plain, default: ''; comma-separated SARIF 2.1.0
#                           file paths to merge as findings)
# Note: AI_FEEDBACK_LOOP (learning loop) is GitHub-only — no-op on Bitbucket.
#
# `clone.depth: full` is required: the action calls `git fetch origin $BASE_REF`
# to compute the diff, and the default shallow Pipelines clone does not always
# include the base branch history.

image:
  # AI_REVIEW_IMAGE_TAG controls which container tag is pulled.
  # IMPORTANT: Bitbucket Pipelines expands $VAR in image.name but does NOT
  # support bash-style ${VAR:-default} parameter expansion (image.name is
  # processed by the Pipelines engine, not bash).  You must set
  # AI_REVIEW_IMAGE_TAG as a repository variable; recommended values:
  #   'latest' — stable
  #   'dev'    — dogfood pre-release builds
  #   '0.11.0' (or similar) — pin a specific release.
  #   Note: image tags strip the 'v' prefix from the git tag (publish-image.yml
  #   uses docker/metadata-action's semver pattern), so the git tag v0.11.0
  #   publishes image tags 0.11.0, 0.11, and 0.
  name: ghcr.io/tag1consulting/ai-pr-review:$AI_REVIEW_IMAGE_TAG
  # For private pulls (ai-pr-review is currently public — use the public
  # pull below unless/until you host your own mirror). If you fork to a
  # private registry, uncomment and configure:
  # username: $GHCR_USER
  # password: $GHCR_TOKEN

clone:
  depth: full

pipelines:
  pull-requests:
    '**':
      - step:
          name: AI PR Review
          script:
            - export VCS_PROVIDER=bitbucket
            - export AI_PROVIDER="${AI_PROVIDER:-anthropic}"
            - export AI_REVIEW_MODE="${AI_REVIEW_MODE:-quick}"
            - export AI_IGNORE_MERGE_COMMITS="${AI_IGNORE_MERGE_COMMITS:-true}"
            # Opt-in capabilities (Python engine only — the default)
            - export AI_CONTEXT_ENRICHMENT="${AI_CONTEXT_ENRICHMENT:-false}"
            - export AI_SARIF_PATHS="${AI_SARIF_PATHS:-}"
            - export PR_NUMBER="$BITBUCKET_PR_ID"
            - export BASE_REF="$BITBUCKET_PR_DESTINATION_BRANCH"
            - export HEAD_SHA="$BITBUCKET_COMMIT"
            - export GITHUB_REPOSITORY="${BITBUCKET_WORKSPACE}/${BITBUCKET_REPO_SLUG}"
            # BITBUCKET_EMAIL + BITBUCKET_API_TOKEN come from repo variables.
            # ANTHROPIC_API_KEY (or your provider's key) also from repo variables.
            - python3 -m ai_pr_review review
